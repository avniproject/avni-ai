    - data:
        code: "\"\"\"\nAmbiguity Checker code node for Dify chatflow.\n\nTakes the\
          \ structured extraction LLM output and validates for completeness,\nconsistency,\
          \ and orphaned references. Runs in Dify's Python sandbox.\n\nInput:  extracted_entities\
          \ (object) — from Extraction LLM structured output\n        {subject_types:\
          \ [...], programs: [...], encounter_types: [...], address_levels: [...]}\n\
          Output: output (object) — contains validated entities (same structure) +\
          \ issues\n\"\"\"\n\n\ndef _fuzzy_match(name, known_names):\n    lower =\
          \ name.strip().lower()\n    for known in known_names:\n        if lower\
          \ == known.lower() or lower in known.lower() or known.lower() in lower:\n\
          \            return True\n    return False\n\n\ndef main(extracted_entities:\
          \ dict):\n    st_rows = extracted_entities.get(\"subject_types\", [])\n\
          \    prog_rows = extracted_entities.get(\"programs\", [])\n    enc_rows\
          \ = extracted_entities.get(\"encounter_types\", [])\n    addr_rows = extracted_entities.get(\"\
          address_levels\", [])\n\n    subject_type_names = {r[\"name\"] for r in\
          \ st_rows if r.get(\"name\")}\n    program_names = {r[\"name\"] for r in\
          \ prog_rows if r.get(\"name\")}\n\n    issues = []\n\n    # Check duplicate\
          \ subject types\n    seen = {}\n    for r in st_rows:\n        key = r.get(\"\
          name\", \"\").strip().lower()\n        if not key:\n            continue\n\
          \        if key in seen:\n            issues.append({\"severity\": \"error\"\
          , \"entity_type\": \"subject_type\",\n                           \"message\"\
          : f\"Duplicate subject type: '{r['name']}'\"})\n        else:\n        \
          \    seen[key] = r[\"name\"]\n\n    # Check subject type fields\n    for\
          \ r in st_rows:\n        if not r.get(\"type\"):\n            issues.append({\"\
          severity\": \"warning\", \"entity_type\": \"subject_type\",\n          \
          \                 \"message\": f\"Subject type '{r.get('name', '?')}' is\
          \ missing 'type'\"})\n\n    # Check duplicate programs\n    seen = {}\n\
          \    for r in prog_rows:\n        key = r.get(\"name\", \"\").strip().lower()\n\
          \        if not key:\n            continue\n        if key in seen:\n  \
          \          issues.append({\"severity\": \"error\", \"entity_type\": \"program\"\
          ,\n                           \"message\": f\"Duplicate program: '{r['name']}'\"\
          })\n        else:\n            seen[key] = r[\"name\"]\n\n    # Check program\
          \ references\n    for r in prog_rows:\n        target = r.get(\"target_subject_type\"\
          , \"\")\n        if not target:\n            issues.append({\"severity\"\
          : \"warning\", \"entity_type\": \"program\",\n                         \
          \  \"message\": f\"Program '{r['name']}' is missing target subject type\"\
          })\n        elif not _fuzzy_match(target, subject_type_names):\n       \
          \     issues.append({\"severity\": \"warning\", \"entity_type\": \"program\"\
          ,\n                           \"message\": f\"Program '{r['name']}' references\
          \ subject type '{target}' which doesn't match any defined subject type\"\
          })\n\n    # Check encounter references\n    for r in enc_rows:\n       \
          \ if r.get(\"is_program_encounter\"):\n            program = r.get(\"program_name\"\
          , \"\")\n            if program and not _fuzzy_match(program, program_names):\n\
          \                issues.append({\"severity\": \"warning\", \"entity_type\"\
          : \"program_encounter\",\n                               \"message\": f\"\
          Program encounter '{r['name']}' references program '{program}' which doesn't\
          \ match any defined program\"})\n        else:\n            subject = r.get(\"\
          subject_type\", \"\")\n            if subject and not _fuzzy_match(subject,\
          \ subject_type_names):\n                issues.append({\"severity\": \"\
          warning\", \"entity_type\": \"encounter\",\n                           \
          \    \"message\": f\"Encounter '{r['name']}' references subject type '{subject}'\
          \ which doesn't match any defined subject type\"})\n\n    # Check location\
          \ hierarchy\n    if not addr_rows:\n        issues.append({\"severity\"\
          : \"warning\", \"entity_type\": \"location_hierarchy\",\n              \
          \         \"message\": \"No location hierarchy found. A default hierarchy\
          \ will be generated.\"})\n\n    error_count = sum(1 for i in issues if i[\"\
          severity\"] == \"error\")\n    warning_count = sum(1 for i in issues if\
          \ i[\"severity\"] == \"warning\")\n\n    if not issues:\n        issues_summary\
          \ = \"No issues found. All entities look good.\"\n    else:\n        lines\
          \ = []\n        errors = [i for i in issues if i[\"severity\"] == \"error\"\
          ]\n        warnings = [i for i in issues if i[\"severity\"] == \"warning\"\
          ]\n        if errors:\n            lines.append(f\"{len(errors)} error(s):\"\
          )\n            for e in errors:\n                lines.append(f\"  [ERROR]\
          \ {e['message']}\")\n        if warnings:\n            lines.append(f\"\
          {len(warnings)} warning(s):\")\n            for w in warnings:\n       \
          \         lines.append(f\"  [WARNING] {w['message']}\")\n        issues_summary\
          \ = \"\\n\".join(lines)\n\n    return {\"output\": {\n        \"entities\"\
          : extracted_entities,\n        \"issues_summary\": issues_summary,\n   \
          \     \"error_count\": error_count,\n        \"warning_count\": warning_count,\n\
          \        \"has_errors\": error_count > 0,\n        \"has_warnings\": warning_count\
          \ > 0,\n    }}\n"
        code_language: python3
        outputs:
          output:
            children: null
            type: object
