            \ name.\n3. To delete: output `{\"_delete\": true, \"name\": \"...\"}`\
            \ in the appropriate entity type array.\n4. To add: output the full entity\
            \ object in the appropriate array.\n5. Only include entity type arrays\
            \ that have changes.\n6. Boolean fields must be actual booleans (`true`/`false`),\
            \ not strings."
