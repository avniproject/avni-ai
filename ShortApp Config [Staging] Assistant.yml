          name: gpt-5
          provider: langgenius/openai/openai
        prompt_template:
        - id: 9e3f4fee-df92-4529-a660-1f3802422240
          role: system
          text: "You are an entity correction assistant. The user has reviewed a list\
            \ of parsed entities from their field workflow specification and wants\
            \ to make changes.\n\nBelow are the current entities:\n\n```json\n{{#conversation.entities_jsonl#}}\
            \ \n```\n\nThe user's correction request:\n{{#sys.query#}}\n\nYour job:\
            \ output a JSON object with corrections grouped by entity type. Only include\
            \ entity types that have changes.\n\nEntity types and their fields:\n\n\
            **subject_types**: `{\"name\": \"...\", \"type\": \"Person|Individual|Household|Group|User\"\
            , \"form_link\": \"...\", \"lowest_address_level\": \"...\", \"description\"\
            : \"...\"}`\n\n**programs**: `{\"name\": \"...\", \"target_subject_type\"\
            : \"...\", \"enrolment_form\": \"...\", \"exit_form\": \"...\", \"description\"\
            : \"...\"}`\n\n**encounter_types**: `{\"name\": \"...\", \"program_name\"\
