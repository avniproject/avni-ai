    - data:
        code: "\"\"\"\nApply Corrections code node for Dify chatflow.\n\nTakes the\
          \ current entities JSONL and the Correction LLM's output\n(a list of updated/new/deleted\
          \ entities), applies the changes.\n\nMatching logic:\n  1. Match by (sheet,\
          \ row) — stable even after renames\n  2. Fallback: match by (type, name)\
          \ — for manually added entities\n  3. No match → append as new entity\n\n\
          If an entity has \"_delete\": true, it is removed.\n\nInput:\n  entities_jsonl\
          \ (list) — current entities from conv var (array[object])\n  corrections_str\
          \ (str) — LLM's output: JSON with corrections array\nOutput:\n  result (list)\
          \ — updated entities array\n\"\"\"\n\nimport json\n\n\ndef main(entities_jsonl:\
          \ list, corrections_str: str):\n    entities = list(entities_jsonl) if entities_jsonl\
          \ else []\n\n    try:\n        parsed = json.loads(corrections_str) if corrections_str\
          \ else {}\n        if isinstance(parsed, dict):\n            corrections\
          \ = parsed.get(\"corrections\", [])\n        elif isinstance(parsed, list):\n\
          \            corrections = parsed\n        else:\n            corrections\
          \ = []\n    except (json.JSONDecodeError, TypeError):\n        return {\"\
          result\": entities}\n\n    if not corrections:\n        return {\"result\"\
          : entities}\n\n    for correction in corrections:\n        if not isinstance(correction,\
          \ dict):\n            continue\n\n        if correction.get(\"_delete\"\
          ):\n            sheet = correction.get(\"sheet\", \"\")\n            row\
          \ = correction.get(\"row\", 0)\n            name = correction.get(\"name\"\
          , \"\")\n            entity_type = correction.get(\"type\", \"\")\n\n  \
          \          for i, entity in enumerate(entities):\n                if sheet\
          \ and row and entity.get(\"sheet\") == sheet and entity.get(\"row\") ==\
          \ row:\n                    entities.pop(i)\n                    break\n\
          \                elif entity.get(\"type\") == entity_type and entity.get(\"\
          name\") == name:\n                    entities.pop(i)\n                \
          \    break\n            continue\n\n        sheet = correction.get(\"sheet\"\
          , \"\")\n        row = correction.get(\"row\", 0)\n        matched_idx =\
          \ None\n\n        if sheet and row:\n            for i, entity in enumerate(entities):\n\
          \                if entity.get(\"sheet\") == sheet and entity.get(\"row\"\
          ) == row:\n                    matched_idx = i\n                    break\n\
          \n        if matched_idx is None:\n            c_type = correction.get(\"\
          type\", \"\")\n            c_name = correction.get(\"name\", \"\")\n   \
          \         for i, entity in enumerate(entities):\n                if entity.get(\"\
          type\") == c_type and entity.get(\"name\") == c_name:\n                \
          \    matched_idx = i\n                    break\n\n        if matched_idx\
          \ is not None:\n            entities[matched_idx] = correction\n       \
          \ else:\n            entities.append(correction)\n\n    return {\"result\"\
          : entities}\n"
        code_language: python3
        outputs:
          result:
            children: null
            type: array[object]
