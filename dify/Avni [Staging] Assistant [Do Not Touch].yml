    - data:
        code: "import json\nimport requests\nfrom typing import Dict, Any\n\n\ndef\
          \ check_task_status(task_id: str, avni_ai_server_url: str) -> Dict[str,\
          \ Any]:\n    session = requests.Session()\n\n    status_url = f\"{avni_ai_server_url}/process-config-status/{task_id}\"\
          \n\n    print(f\"\U0001F50D Checking task status: {task_id}\")\n\n    try:\n\
          \        status_response = session.get(status_url, timeout=10)\n\n     \
          \   if status_response.status_code != 200:\n            error_text = status_response.text\n\
          \            return {\n                \"error\": f\"Status check HTTP {status_response.status_code}\"\
          ,\n                \"message\": error_text,\n                \"task_id\"\
          : task_id,\n            }\n\n        status_result = status_response.json()\n\
          \        return status_result\n\n    except requests.exceptions.RequestException\
          \ as e:\n        return {\"error\": \"Status check failed\", \"message\"\
          : str(e), \"task_id\": task_id}\n\n\ndef main(output: Dict[str, Any], avni_ai_server_url:\
          \ str):\n    print(\"\U0001F680 Config Task Status Check\")\n    print(\"\
          =\" * 40)\n\n    task_id = output.get(\"task_id\")\n    result = check_task_status(task_id,\
          \ avni_ai_server_url)\n\n    status = result.get(\"status\")\n    if status\
          \ in [\"completed\", \"failed\", \"expired\"]:\n        print(f\"✅ Terminal\
          \ status reached: {status}\")\n\n    print(\"\\n\" + \"=\" * 40)\n    print(\"\
          \U0001F3C1 FINAL RESULT:\")\n    print(json.dumps(result, indent=2))\n\n\
          \    return {\"output\": result}\n"
