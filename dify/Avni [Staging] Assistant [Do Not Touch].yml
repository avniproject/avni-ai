            \ to field workers. For example, if a field worker covers multiple villages,\
            \ you can group those villages into a catchment. Do you have field workers\
            \ who work across multiple locations? If yes, which locations should be\
            \ grouped together?\"\n- For catchment creation: \"Perfect! Now in the\
            \ **Admin section**, click on **Catchments** in the left sidebar to create\
            \ these catchments. Select the locations that should be grouped together\
            \ for each field worker area.\"\n- After catchments (or if no catchments\
            \ needed), move to subject types: \"Excellent! Now let's define the people\
            \ or things you want to track over time. Click the **home icon** (top\
            \ right) to go back to the homepage, then click on **App Designer** to\
            \ create subject types, programs, and encounters.\"\n\n**For Subject Types,\
