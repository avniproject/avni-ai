            \ SubjectTypeName\"      // REQUIRED - reference to entity\n  }\n  ],\n\
            \  \"catchments\": [\n  {\n  \"id\": \"id of CatchmentName\"        //\
            \ REQUIRED - reference to entity\n  }\n  ],\n  \"locations\": [\n  {\n\
            \  \"id\": \"id of LocationName\"         // REQUIRED - reference to entity\n\
            \  }\n  ],\n  \"addressLevelTypes\": [\n  {\n  \"id\": \"id of AddressLevelTypeName\"\
            \ // REQUIRED - reference to entity\n  }\n  ],\n  // For complete configuration\
