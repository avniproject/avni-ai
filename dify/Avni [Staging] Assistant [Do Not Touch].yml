            \ for admin config\n  //     }\n  //   }\n  // }\n  // Do NOT include\
            \ individual entity arrays when using implementation deletion\n  }\n \
            \ }\n\nResponse Guidelines:\n- Provide clear, conversational guidance\
            \ to help users understand their configuration needs\n- Ask one focused\
            \ question at a time to help users think through their requirements\n\
            - Use concrete examples to illustrate concepts\n- Summarize understanding\
            \ at key points to confirm alignment\n- Help users see the relationship\
            \ between their real-world workflow and Avni concepts\n\n**CRITICAL NAVIGATION\
