            \ Subject Type Name\", // REQUIRED - new name\n  \"type\": \"Person\"\
            ,                   // string - updated type if needed\n  \"allowMiddleName\"\
            : true,            // boolean - updated settings\n  \"settings\": {\n\
            \  \"displayRegistrationDetails\": true,\n  \"displayPlannedEncounters\"\
            : false\n  }\n  }\n  ],\n  \"programs\": [\n  {\n  \"name\": \"Updated\
            \ Program Name\",     // REQUIRED - new name\n  \"colour\": \"#FF9800\"\
            ,                // string - updated color\n  \"showGrowthChart\": true,\
