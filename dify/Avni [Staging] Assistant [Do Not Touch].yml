    - data:
        code: "import json\nimport requests\nfrom typing import Dict, Any\n\n\ndef\
          \ submit_async_config(\n    configuration: Dict[str, Any],\n    avni_auth_token:\
          \ str,\n    avni_ai_server_url: str,\n) -> Dict[str, Any]:\n    session\
          \ = requests.Session()\n\n    submit_url = f\"{avni_ai_server_url}/process-config-async\"\
          \n\n    headers = {\"Content-Type\": \"application/json\", \"avni-auth-token\"\
          : avni_auth_token}\n\n    body = {\"configuration\": configuration}\n\n\
          \    print(f\"\U0001F4E4 Submitting configuration to: {submit_url}\")\n\
          \    print(f\"\U0001F4CB Headers: {json.dumps(headers, indent=2)}\")\n \
          \   print(f\"\U0001F4E6 Body size: {len(json.dumps(body).encode('utf-8'))}\
          \ bytes\")\n\n    try:\n        response = session.post(submit_url, headers=headers,\
          \ json=body, timeout=30)\n\n        if response.status_code != 200:\n  \
          \          error_text = response.text\n            return {\"error\": f\"\
          HTTP {response.status_code}\", \"message\": error_text}\n\n        result\
          \ = response.json()\n        task_id = result.get(\"task_id\")\n\n     \
          \   if not task_id:\n            return {\"error\": \"No task_id returned\"\
          , \"response\": result}\n\n        return {\"task_id\": task_id, \"status\"\
          : \"submitted\"}\n\n    except requests.exceptions.RequestException as e:\n\
          \        print(f\"\U0001F525 Submit request failed: {e}\")\n        return\
          \ {\"error\": \"Submit request failed\", \"message\": str(e)}\n\n\ndef main(avni_auth_token:\
          \ str, avni_ai_server_url: str, configuration: Dict[str, Any]):\n    print(\"\
          \U0001F680 Avni Async Config Submission\")\n    print(\"=\" * 40)\n\n  \
          \  print(\"\U0001F4CB Configuration preview:\")\n    print(json.dumps(configuration,\
          \ indent=2)[:300] + \"...\")\n\n    result = submit_async_config(\n    \
          \    configuration=configuration,\n        avni_auth_token=avni_auth_token,\n\
          \        avni_ai_server_url=avni_ai_server_url,\n    )\n\n    print(\"\\\
