    - data:
        code: "import json\nimport re\n\ndef main(agent_output: str, active_agent: str,\n         current_active_phase: str,\n\
          \         current_spec_awaiting: bool,\n         current_pending_ambiguities: list) -> dict:\n    \"\"\"Parse the\
          \ structured JSON block emitted at the end of an agent's\n    response and compute new conversation-variable values.\
          \ Pass-through\n    the current state when no JSON block is found so downstream assigners\n    can overwrite unconditionally\
          \ without losing state.\n    \"\"\"\n    intent = \"\"\n    target_phase = \"\"\n    ambiguities = []\n    applied_changes\
          \ = []\n    reason = \"\"\n    parsed_ok = False\n    payload = None\n    text = agent_output or \"\"\n\n    # Prefer\
          \ a fenced ```json ... ``` block.\n    m = re.search(r\"```json\\s*(\\{.*?\\})\\s*```\", text, re.DOTALL)\n    if\
          \ m:\n        try:\n            payload = json.loads(m.group(1))\n        except Exception:\n            payload\
          \ = None\n\n    # Fall back: last brace-balanced object containing \"intent\".\n    if payload is None:\n      \
          \  for match in reversed(list(\n            re.finditer(r\"\\{[^{}]*\\\"intent\\\"[^{}]*\\}\", text, re.DOTALL)\n\
          \        )):\n            try:\n                payload = json.loads(match.group(0))\n                break\n  \
          \          except Exception:\n                continue\n\n    if isinstance(payload, dict):\n        intent = str(payload.get(\"\
          intent\", \"\") or \"\")\n        target_phase = str(payload.get(\"target_phase\", \"\") or \"\")\n        ambiguities\
          \ = payload.get(\"ambiguities\", []) or []\n        applied_changes = payload.get(\"applied_changes\", []) or []\n\
          \        reason = str(payload.get(\"reason\", \"\") or \"\")\n        parsed_ok = True\n\n    # Computed pass-through\
          \ outputs.\n    out_active_phase = (\n        target_phase\n        if (parsed_ok and target_phase)\n        else\
          \ (current_active_phase or \"intake\")\n    )\n    out_spec_awaiting = (\n        bool(parsed_ok and intent == \"\
          ask_user\" and active_agent == \"spec\")\n        if parsed_ok\n        else bool(current_spec_awaiting)\n    )\n\
          \    out_pending_ambiguities = (\n        ambiguities\n        if (parsed_ok and intent == \"ask_user\")\n     \
          \   else (current_pending_ambiguities or [])\n    )\n    # Dify cloud does not accept object-typed conversation\
          \ variables,\n    # so agent_structured is stored as a JSON string. Serialize here.\n    raw_payload_obj = payload\
          \ if isinstance(payload, dict) else {}\n    raw_payload = json.dumps(raw_payload_obj)\n\n    return {\n        \"\
          intent\": intent,\n        \"target_phase\": target_phase,\n        \"ambiguities\": ambiguities,\n        \"applied_changes\"\
          : applied_changes,\n        \"reason\": reason,\n        \"parsed_ok\": parsed_ok,\n        \"out_active_phase\"\
          : out_active_phase,\n        \"out_spec_awaiting\": out_spec_awaiting,\n        \"out_pending_ambiguities\": out_pending_ambiguities,\n\
          \        \"raw_payload\": raw_payload,\n    }\n"
