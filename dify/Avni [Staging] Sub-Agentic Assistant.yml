    - data:
        code: "import json\nimport re\n\ndef main(active_agent: str, workflow_mode: str, agent_output: str,\n         agent_memory:\
          \ str, last_gate_status: str,\n         agent_structured: str) -> dict:\n    \"\"\"Stage B decider: deterministic\
          \ routing from typed conversation\n    variables. Replaces the old ~60-line keyword-matching logic.\n\n    agent_structured\
          \ arrives as a JSON-serialized string (Dify cloud\n    does not accept object-typed conversation variables), so\
          \ we parse\n    it here before reading typed fields.\n\n    Rule order:\n      1. targeted mode  -> done\n     \
          \ 2. intent=ask_user  -> pause (done)\n      3. intent=error     -> pause (done)\n      4. intent=re_route + Inspector\
          \  -> branch to re_route_target\n      5. legacy markers ([AWAITING_USER_INPUT], [ROUTE_TO:x])\n      6. gate errors\
          \ + under retry cap  -> re-run same agent\n      7. gate errors + over retry cap   -> done (fail)\n      8. gate\
          \ user_input_needed         -> pause\n      9. gate ok / not_run              -> advance in chain\n    \"\"\"\n\
          \    if workflow_mode == \"targeted\":\n        return {\"next_agent\": \"done\", \"loop_done\": True,\n       \
          \         \"reason\": \"Targeted mode — single agent only\"}\n\n    struct = {}\n    try:\n        if agent_structured:\n\
          \            struct = json.loads(agent_structured) or {}\n    except Exception:\n        struct = {}\n\n    intent\
          \ = str(struct.get(\"intent\", \"\") or \"\")\n\n    if intent == \"ask_user\":\n        return {\"next_agent\"\
          : \"done\", \"loop_done\": True,\n                \"reason\": f\"{active_agent} intent=ask_user (structured)\"}\n\
          \    if intent == \"error\":\n        return {\"next_agent\": \"done\", \"loop_done\": True,\n                \"\
          reason\": f\"{active_agent} intent=error (structured)\"}\n\n    if intent == \"re_route\" and active_agent == \"\
          inspect\":\n        target = str(struct.get(\"re_route_target\", \"\") or \"\")\n        valid_targets = (\"spec\"\
          , \"bundle_config\", \"rules\", \"reports\")\n        if target in valid_targets:\n            mem_lc = (agent_memory\
          \ or \"\").lower()\n            if \"[rerouted from inspect]\" not in mem_lc:\n                return {\"next_agent\"\
          : target, \"loop_done\": False,\n                        \"reason\": f\"Inspector re_route -> {target} (structured)\"\
          }\n\n    t = (agent_output or \"\").lower()\n    mem = (agent_memory or \"\").lower()\n\n    if \"[awaiting_user_input]\"\
          \ in t:\n        return {\"next_agent\": \"done\", \"loop_done\": True,\n                \"reason\": f\"{active_agent}\
          \ legacy [AWAITING_USER_INPUT] marker\"}\n\n    route_match = re.search(r\"\\[route_to:(\\w+)\\]\", t)\n    if route_match\
          \ and active_agent == \"inspect\":\n        target = route_match.group(1)\n        valid_targets = (\"spec\", \"\
          bundle_config\", \"rules\", \"reports\")\n        if target in valid_targets and \"[rerouted from inspect]\" not\
          \ in mem:\n            return {\"next_agent\": target, \"loop_done\": False,\n                    \"reason\": f\"\
          Inspector routing to {target} for fixes\"}\n\n    MAX_RETRIES = 3\n    runs_so_far = mem.count(f\"[gate-ran:{active_agent}]\"\
          )\n\n    if last_gate_status == \"errors\":\n        if runs_so_far < MAX_RETRIES:\n            return {\"next_agent\"\
          : active_agent, \"loop_done\": False,\n                    \"reason\": (\n                        f\"Gate errors\
          \ after {runs_so_far} run(s), \"\n                        f\"re-running {active_agent} \"\n                    \
          \    f\"({runs_so_far}/{MAX_RETRIES})\"\n                    )}\n        return {\"next_agent\": \"done\", \"loop_done\"\
          : True,\n                \"reason\": (\n                    f\"Gate errors persist after {MAX_RETRIES} retries \"\
          \n                    f\"of {active_agent}\"\n                )}\n\n    if last_gate_status == \"user_input_needed\"\
          :\n        return {\"next_agent\": \"done\", \"loop_done\": True,\n                \"reason\": f\"Gate requests\
          \ user input from {active_agent}\"}\n\n    chain = [\"spec\", \"bundle_config\", \"rules\", \"reports\", \"inspect\"\
          ]\n    try:\n        idx = chain.index(active_agent)\n    except ValueError:\n        return {\"next_agent\": \"\
          done\", \"loop_done\": True,\n                \"reason\": f\"Unknown agent: {active_agent}\"}\n\n    if idx < len(chain)\
          \ - 1:\n        next_a = chain[idx + 1]\n        return {\"next_agent\": next_a, \"loop_done\": False,\n       \
          \         \"reason\": f\"{active_agent} done, advancing to {next_a}\"}\n\n    return {\"next_agent\": \"done\",\
          \ \"loop_done\": True,\n            \"reason\": \"End of chain\"}\n"
        code_language: python3
