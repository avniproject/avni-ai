    - data:
        code: "import re\n\ndef main(active_agent: str, workflow_mode: str,\n     \
          \    agent_output: str) -> dict:\n    if workflow_mode == \"targeted\":\n \
          \       return {\"next_agent\": \"done\", \"loop_done\": True,\n         \
          \       \"reason\": \"Targeted mode — single agent only\"}\n\n    t = (agent_output\
          \ or \"\").lower()\n    has_output = len(t.strip()) > 50\n\n    # Detect\
          \ if agent is asking user a question (should exit loop)\n    question_signals\
          \ = [\"could you\", \"can you please\", \"would you like\",\n            \
          \         \"please provide\", \"please confirm\", \"please share\",\n   \
          \                  \"let me know\", \"what would you\", \"which option\",\
          \n                     \"do you want\", \"shall i\", \"?\\'s next?\"]\n \
          \   asking_user = any(q in t for q in question_signals) and t.rstrip().endswith(\"\
          ?\")\n\n    # Completion signals per agent\n    completion = {\n        \"\
          spec\": [\"generate_spec\", \"spec generated\", \"stored=true\",\n      \
          \           \"approved\", \"encounter types\", \"subject types\",\n      \
          \           \"spec summary\", \"configuration summary\",\n              \
          \   \"forms |\", \"programs |\", \"address hierarchy\"],\n        \"bundle_config\"\
          : [\"generate_bundle\", \"bundle generated\",\n                    \"validate_bundle\"\
          , \"put_bundle_file\", \"upload_bundle\",\n                    \"generate_form\"\
          , \"concepts.json\", \"formmappings\",\n                    \"bundle complete\"\
          , \"bundle is ready\"],\n        \"rules\": [\"generate_rule\", \"validate_rule\"\
          , \"rule code\",\n                 \"visitschedule\", \"decision rule\",\
