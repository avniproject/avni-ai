          \ dict:\n    has_errors = False\n    gate_output = \"\"\n    last_gate_status = \"not_run\"\n    last_gate_errors_str\
          \ = \"\"\n    last_gate_warnings_str = \"\"\n    try:\n        parsed = json.loads(gate_body) if gate_body else\
          \ {}\n        errors = parsed.get(\"errors\", []) or []\n        warnings = parsed.get(\"warnings\", []) or []\n\
          \        next_action = parsed.get(\"next_action\", \"\")\n        has_errors = len(errors) > 0\n        last_gate_errors_str\
          \ = chr(10).join(str(e) for e in errors)\n        last_gate_warnings_str = chr(10).join(str(w) for w in warnings)\n\
          \        if next_action == \"user_input_needed\":\n            has_errors = False\n            last_gate_status\
          \ = \"user_input_needed\"\n        elif has_errors:\n            last_gate_status = \"errors\"\n        else:\n\
          \            last_gate_status = \"ok\"\n        parts = []\n        for err in errors:\n            parts.append(\"\
          [GATE ERROR] \" + str(err))\n        for warn in warnings[:5]:\n            parts.append(\"[GATE WARNING] \" + str(warn))\n\
          \        # Always log this gate run so the decider can count attempts.\n        if active_agent:\n            parts.append(\"\
          [gate-ran:\" + active_agent + \"]\")\n        gate_output = chr(10).join(parts)\n    except Exception:\n       \
          \ pass\n    if gate_status >= 400:\n        has_errors = False\n        last_gate_status = \"errors\"\n        last_gate_errors_str\
          \ = f\"Gate HTTP {gate_status}\"\n    return {\n        \"has_questions\": has_errors,\n        \"gate_output\"\
          : gate_output,\n        \"last_gate_status\": last_gate_status,\n        \"last_gate_errors\": last_gate_errors_str,\n\
          \        \"last_gate_warnings\": last_gate_warnings_str,\n    }\n"
