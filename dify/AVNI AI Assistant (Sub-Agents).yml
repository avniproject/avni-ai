app:
  description: AVNI AI Assistant with sub-agentic architecture for program specification,
    form design, rules, reports, inspection, and admin operations
  icon: "\U0001F916"
  icon_background: '#E7F3F8'
  icon_type: emoji
  mode: advanced-chat
  name: AVNI AI Assistant (Sub-Agents)
  use_icon_as_answer_icon: true
dependencies: []
kind: app
version: 0.6.0
workflow:
  conversation_variables:
  - description: Detected or user-stated sector (MCH, Livelihoods, Education, etc.)
    id: a1b2c3d4-0001-4000-8000-000000000001
    name: sector
    selector:
    - conversation
    - sector
    value: ''
    value_type: string
  - description: Organisation name
    id: a1b2c3d4-0002-4000-8000-000000000002
    name: org_name
    selector:
    - conversation
    - org_name
    value: ''
    value_type: string
  - description: Whether this is a new organisation (true) or updating existing (false)
    id: a1b2c3d4-0003-4000-8000-000000000003
    name: is_new_org
    selector:
    - conversation
    - is_new_org
    value: 'true'
    value_type: string
  - description: Current workflow phase (spec, forms, rules, reports, inspect, admin)
    id: a1b2c3d4-0004-4000-8000-000000000004
    name: current_phase
    selector:
    - conversation
    - current_phase
    value: ''
    value_type: string
  - description: URL of the avni-ai MCP server
    id: a1b2c3d4-0005-4000-8000-000000000005
    name: avni_mcp_server_url
    selector:
    - conversation
    - avni_mcp_server_url
    value: https://staging-ai.avniproject.org/
    value_type: string
  - description: Avni auth token for API calls
    id: a1b2c3d4-0006-4000-8000-000000000006
    name: auth_token
    selector:
    - conversation
    - auth_token
    value: ''
    value_type: string
  - description: Base URL for the Avni application
    id: a1b2c3d4-0007-4000-8000-000000000007
    name: avni_base_url
    selector:
    - conversation
    - avni_base_url
    value: https://staging.avniproject.org
    value_type: string
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .xlsx
      - .csv
      - .json
      - .zip
      - .txt
      - .js
      allowed_file_types:
      - document
      - custom
      allowed_file_upload_methods:
      - local_file
      enabled: true
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 50
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: 'I''m the AVNI AI Assistant. I can help you with:


      1. **Set up a new program** — upload an SRS or describe your program

      2. **Design forms** — add fields, skip logic, and validations

      3. **Create rules** — visit scheduling, auto-calculations, decision support

      4. **Build dashboards** — report cards and monitoring views

      5. **Review configuration** — check completeness and find gaps

      6. **Manage locations & users** — set up hierarchy, catchments, and accounts


      What would you like to work on?'
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - Set up a new MCH program
    - Help me design a registration form
    - Review my current configuration
    - Create a dashboard for field workers
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
