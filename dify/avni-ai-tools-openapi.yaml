openapi: 3.0.0
info:
  title: Avni AI Tools
  version: 1.0.0
  description: Avni app configurator tools for entity validation, spec generation, and bundle management
servers:
  - url: https://staging-ai.avniproject.org
paths:
  /store-auth-token:
    post:
      operationId: store_auth_token
      summary: Store an Avni auth token by conversation_id for automatic resolution
      description: Call this once at the start of a conversation. All subsequent tool calls that need auth can just pass conversation_id instead of the avni-auth-token header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  description: Dify conversation ID (sys.conversation_id)
                auth_token:
                  type: string
                  description: Avni authentication token
              required:
                - conversation_id
                - auth_token
      responses:
        '200':
          description: Token stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  conversation_id:
                    type: string

  /parse-srs-file:
    post:
      operationId: parse_srs_file
      summary: Parse uploaded Excel SRS file into entities using structured parser
      description: Decodes a base64-encoded Excel SRS file, runs the deterministic scoping_parser server-side, and stores the resulting entities under conversation_id. Returns ok=true with entity counts on success, ok=false with error on parse failure.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - conversation_id
                - file_infos
              properties:
                conversation_id:
                  type: string
                  description: Dify conversation ID (sys.conversation_id)
                file_infos:
                  type: array
                  description: List of base64-encoded files to parse
                  items:
                    type: object
                    properties:
                      b64:
                        type: string
                        description: Base64-encoded file content
                      filename:
                        type: string
                        description: Original filename (determines parser format)
      responses:
        '200':
          description: Parse result (ok=false does not use 4xx so Dify can inspect the flag)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  summary:
                    type: object
                    description: Entity counts from the parsed file
                    properties:
                      address_levels:
                        type: integer
                      subject_types:
                        type: integer
                      programs:
                        type: integer
                      encounter_types:
                        type: integer
                      forms:
                        type: integer
                      groups:
                        type: integer
                      total_fields:
                        type: integer
                  warnings:
                    type: array
                    description: Non-fatal issues (missing forms, empty fields, etc.)
                    items:
                      type: string
                  errors:
                    type: array
                    description: Fatal issues that may cause bundle generation to fail
                    items:
                      type: string
                  coverage:
                    type: object
                    description: Flags indicating what was found in the parsed file
                  error:
                    type: string
                    description: Present only when ok=false — reason the parse failed

  /get-srs-text:
    get:
      operationId: get_srs_text
      summary: Retrieve the stored SRS document text for this conversation
      description: The SRS document text is pre-stored server-side by the Dify workflow before the agent starts. Call this to fetch the full text for entity extraction instead of reading it from the query field.
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
          description: Dify conversation ID (sys.conversation_id)
      responses:
        '200':
          description: SRS text retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  srs_text:
                    type: string
                    description: Full extracted SRS document text
                  char_count:
                    type: integer
        '404':
          description: No SRS text found (not uploaded or expired)

  /store-entities:
    post:
      operationId: store_entities
      summary: Cache entities server-side by conversation_id (TTL 6h)
      description: Call this once after entity extraction. Agent tools can then pass only conversation_id instead of the full entities payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  description: Dify conversation ID (sys.conversation_id)
                entities:
                  type: object
                  description: Full extracted entities dict
              required:
                - conversation_id
                - entities
      responses:
        '200':
          description: Entities cached
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /validate-entities:
    post:
      operationId: validate_entities
      summary: Validate extracted entities for structural issues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  description: Dify conversation ID — server looks up entities from store
              required:
                - conversation_id
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  issues:
                    type: array
                    items:
                      type: object
                  error_count:
                    type: integer
                  warning_count:
                    type: integer
                  issues_summary:
                    type: string
                  has_errors:
                    type: boolean
                  has_warnings:
                    type: boolean
                  entities:
                    type: object

  /apply-entity-corrections:
    post:
      operationId: apply_entity_corrections
      summary: Apply corrections to extracted entities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  description: Dify conversation ID — server looks up and updates stored entities
                corrections:
                  type: array
                  description: Array of correction objects specifying changes to apply
                  items:
                    type: object
              required:
                - conversation_id
                - corrections
      responses:
        '200':
          description: Corrected entities
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object

  /generate-spec:
    post:
      operationId: generate_spec
      summary: Generate a YAML spec from stored entities and store it server-side
      description: |
        When conversation_id is provided the generated spec is stored server-side
        and ONLY a compact summary is returned — spec_yaml never reaches the LLM.
        After this returns {stored: true}, call GET /get-spec to retrieve the full
        YAML for display to the user. Legacy mode (no conversation_id) returns spec_yaml directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  description: Dify conversation ID — server looks up entities from store
                org_name:
                  type: string
                  description: Organisation name
              required:
                - conversation_id
      responses:
        '200':
          description: Spec stored confirmation with summary (preferred) or spec_yaml (legacy)
          content:
            application/json:
              schema:
                type: object
                properties:
                  stored:
                    type: boolean
                    description: True when spec was stored server-side
                  char_count:
                    type: integer
                  summary:
                    type: object
                    description: "Section-level counts (e.g. {encounterTypes: 5, programs: 3})"
                  next_step:
                    type: string
                  spec_yaml:
                    type: string
                    description: Only present in legacy mode (no conversation_id)

  /validate-spec:
    post:
      operationId: validate_spec
      summary: Validate a YAML spec for structural and cross-reference errors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                spec_yaml:
                  type: string
                  description: YAML spec string to validate
              required:
                - spec_yaml
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
                  warnings:
                    type: array
                    items:
                      type: string
                  suggestions:
                    type: array
                    items:
                      type: string

  /spec-to-entities:
    post:
      operationId: spec_to_entities
      summary: Convert a YAML spec to a full entities dict for bundle generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                spec_yaml:
                  type: string
                  description: Approved YAML spec string
              required:
                - spec_yaml
      responses:
        '200':
          description: Full entities dict
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: object

  /bundle-to-spec:
    post:
      operationId: bundle_to_spec
      summary: Convert an existing bundle to a human-readable YAML spec
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bundle:
                  type: object
                  description: Bundle object to convert
                org_name:
                  type: string
                  description: Organisation name
      responses:
        '200':
          description: YAML spec derived from bundle
          content:
            application/json:
              schema:
                type: object
                properties:
                  spec_yaml:
                    type: string

  /generate-bundle:
    post:
      operationId: generate_bundle
      summary: Generate a complete Avni bundle ZIP from entities
      description: |
        Preferred: pass conversation_id only (no entities). Entities are fetched
        automatically from the server-side entity store populated by store_entities.
        Bundle is stored server-side (TTL 6h) and only a lightweight summary is
        returned — nothing large reaches the LLM. Pass the same conversation_id to
        validate_bundle and upload_bundle afterwards.
        Legacy: pass entities directly (with or without conversation_id).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  description: Dify conversation ID — entities fetched from store, bundle stored server-side
                org_name:
                  type: string
                  description: Organisation name
                entities:
                  type: object
                  description: Full entities dict (legacy — omit when using conversation_id)
      responses:
        '200':
          description: Bundle summary (conversation_id path) or full bundle_zip_b64 (legacy)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  stored:
                    type: boolean
                    description: true when bundle was saved server-side via conversation_id
                  summary:
                    type: object
                    description: Counts of concepts, forms, subjectTypes, etc.
                  validation:
                    type: object
                  confidence:
                    type: object
                  bundle_zip_b64:
                    type: string
                    description: Present only in legacy mode (no conversation_id)

  /validate-bundle:
    post:
      operationId: validate_bundle
      summary: Validate a generated bundle for structural correctness
      description: |
        Preferred: pass conversation_id to fetch bundle from server-side store
        (no large payload on LLM). Fallback: pass bundle dict or bundle_zip_b64 directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  description: Dify conversation ID — server fetches bundle from store (preferred)
                bundle:
                  type: object
                  description: Bundle JSON dict to validate (legacy)
                bundle_zip_b64:
                  type: string
                  description: Base64 encoded bundle ZIP (legacy)
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
                  warnings:
                    type: array
                    items:
                      type: string
        '404':
          description: No stored bundle found for conversation_id

  /patch-bundle:
    post:
      operationId: patch_bundle
      summary: Patch an existing bundle ZIP with a new spec
      description: |
        Preferred (JSON body): pass conversation_id + spec_yaml. The existing bundle
        is fetched from server-side store (must have called download_bundle_b64 with
        conversation_id first). The patched result is stored under conversation_id
        ready for validate_bundle and upload_bundle — no bundle_zip_b64 on the LLM.
        Legacy (multipart/form-data): pass existing_bundle_b64 + spec_yaml directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  description: Dify conversation ID — fetches existing bundle from store, stores patched result
                spec_yaml:
                  type: string
                  description: Approved YAML spec string to generate the patched bundle from
                existing_bundle_b64:
                  type: string
                  description: Base64 encoded existing bundle ZIP (legacy, when no conversation_id)
              required:
                - spec_yaml
      responses:
        '200':
          description: Patched bundle summary (conversation_id path) or full b64 (legacy)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  stored:
                    type: boolean
                    description: true when patched bundle was saved server-side
                  size_bytes:
                    type: integer
                  files_patched:
                    type: integer
                  validation:
                    type: object
                  confidence:
                    type: object
                  patched_bundle_b64:
                    type: string
                    description: Present only in legacy mode (no conversation_id)
        '400':
          description: Bad request — malformed body or invalid spec
        '404':
          description: No stored existing bundle for conversation_id
        '500':
          description: Internal server error

  /upload-bundle:
    post:
      operationId: upload_bundle
      summary: Upload a bundle ZIP to Avni server for import
      description: |
        Auth and bundle are both resolved from server-side store using conversation_id.
        Pass conversation_id (after calling generate_bundle or patch_bundle with it)
        and neither bundle_zip_b64 nor an auth header is needed.
        Legacy: pass bundle_zip_b64 directly with avni-auth-token header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  description: Dify conversation ID — resolves both stored auth token and stored bundle
                bundle_zip_b64:
                  type: string
                  description: Base64 encoded bundle ZIP (legacy, when no conversation_id)
      responses:
        '200':
          description: Upload task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  status:
                    type: string
                    enum: [pending]
        '400':
          description: Bad request — malformed bundle
        '401':
          description: Unauthorized — missing or expired auth token
        '500':
          description: Internal server error

  /upload-status/{task_id}:
    get:
      operationId: upload_status
      summary: Check the status of a bundle upload task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: The upload task ID returned by upload-bundle
      responses:
        '200':
          description: Upload status
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  status:
                    type: string
                    enum: [pending, processing, completed, failed]
                  progress:
                    type: string
                  result:
                    type: object
                  error:
                    type: string

  /api/existing-config:
    get:
      operationId: get_existing_config
      summary: Download the current organisation configuration from Avni
      description: |
        Fetches up to six resource arrays from the Avni server. Use the optional
        query params to limit what is returned and avoid large context payloads.
        Default cap per array: MAX_CONFIG_ITEMS env var (100 items). Pass max_items=0
        for unlimited. Truncated arrays include a companion '{key}_truncated' object
        with {truncated: true, total: N, returned: M}.
      parameters:
        - name: sections
          in: query
          required: false
          schema:
            type: string
          description: |
            Comma-separated list of sections to fetch. Valid values:
            addressLevelTypes, locations, catchments, subjectTypes, programs, encounterTypes.
            Default: all sections.
          example: subjectTypes,programs,encounterTypes
        - name: max_items
          in: query
          required: false
          schema:
            type: integer
          description: |
            Cap each returned array to this many items. 0 = unlimited.
            Default: MAX_CONFIG_ITEMS env var (100).
          example: 50
      responses:
        '200':
          description: Requested configuration sections
          content:
            application/json:
              schema:
                type: object
                properties:
                  addressLevelTypes:
                    type: array
                    items:
                      type: object
                  locations:
                    type: array
                    items:
                      type: object
                  catchments:
                    type: array
                    items:
                      type: object
                  subjectTypes:
                    type: array
                    items:
                      type: object
                  programs:
                    type: array
                    items:
                      type: object
                  encounterTypes:
                    type: array
                    items:
                      type: object
        '401':
          description: Unauthorized — missing or expired auth token
        '502':
          description: Upstream Avni server error

  /download-bundle-b64:
    get:
      operationId: download_bundle_b64
      summary: Download existing org bundle from Avni and store server-side
      description: |
        When conversation_id is provided: downloads the org's current bundle, stores
        it server-side under '{conversation_id}:existing' (TTL 6h), and returns a
        summary only — bundle_zip_b64 never reaches the LLM. Afterwards use
        get_bundle_files/get_bundle_file to inspect it, or patch_bundle to apply
        spec changes.
        Without conversation_id: legacy behaviour, returns full bundle_zip_b64.
      parameters:
        - name: includeLocations
          in: query
          required: false
          schema:
            type: boolean
        - name: conversation_id
          in: query
          required: false
          schema:
            type: string
          description: Dify conversation ID — resolves auth token and stores bundle server-side
        - name: baseUrl
          in: query
          required: false
          schema:
            type: string
          description: Override Avni base URL
      responses:
        '200':
          description: Bundle stored summary (conversation_id path) or full bundle_zip_b64 (legacy)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  stored:
                    type: boolean
                    description: true when bundle was saved server-side
                  bundle_type:
                    type: string
                    enum: [existing]
                  size_bytes:
                    type: integer
                  include_locations:
                    type: boolean
                  bundle_zip_b64:
                    type: string
                    description: Present only in legacy mode (no conversation_id)
        '401':
          description: Unauthorized — missing or expired auth token
        '500':
          description: Internal server error

  /bundle-files:
    get:
      operationId: get_bundle_files
      summary: List all files in a stored bundle with their sizes
      description: |
        Use bundle_type='generated' (default) to inspect the bundle produced by
        generate_bundle or patch_bundle. Use bundle_type='existing' for the org's
        current bundle downloaded via download_bundle_b64. Returns filenames and
        byte sizes so you can choose which file to read with get_bundle_file.
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
          description: Dify conversation ID
        - name: bundle_type
          in: query
          required: false
          schema:
            type: string
            enum: [generated, existing]
            default: generated
          description: Which bundle to inspect
      responses:
        '200':
          description: List of files in the bundle
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        size_bytes:
                          type: integer
                  total_files:
                    type: integer
                  bundle_type:
                    type: string
                  conversation_id:
                    type: string
        '404':
          description: No stored bundle found for conversation_id

  /get-spec:
    get:
      operationId: get_spec
      summary: Retrieve the full stored spec YAML for display to the user
      description: |
        Call this after generate_spec confirms {stored: true}. Returns the full
        spec_yaml for the agent to show in a code block. Response is capped at
        MAX_SPEC_RESPONSE_CHARS (default 8000) as a safety fallback; truncated=true
        indicates the spec was cut — use get_spec_section to retrieve individual sections.
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
          description: Dify conversation ID
      responses:
        '200':
          description: Full spec YAML
          content:
            application/json:
              schema:
                type: object
                properties:
                  spec_yaml:
                    type: string
                  truncated:
                    type: boolean
        '404':
          description: No stored spec for conversation_id

  /spec-section:
    get:
      operationId: get_spec_section
      summary: Fetch one top-level section from the stored spec
      description: |
        Returns a single top-level YAML key (e.g. encounterTypes, programs) so the
        agent can review or edit one section at a time without loading the full spec.
        Valid sections: subjectTypes, programs, encounterTypes, addressLevels, groups
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
        - name: section
          in: query
          required: true
          schema:
            type: string
          description: Top-level YAML key to fetch
      responses:
        '200':
          description: Section value and YAML fragment
          content:
            application/json:
              schema:
                type: object
                properties:
                  section:
                    type: string
                  value:
                    description: Parsed value of the section
                  yaml:
                    type: string
                    description: YAML-formatted fragment for the section
        '404':
          description: Section or stored spec not found
    put:
      operationId: update_spec_section
      summary: Replace one top-level section in the stored spec
      description: |
        Surgical edit — replaces a single top-level YAML key and re-stores the spec.
        Use to fix one section (e.g. encounterTypes) without rewriting the whole spec.
        Provide either 'value' (parsed object) or 'yaml_fragment' (YAML string).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                section:
                  type: string
                  description: Top-level YAML key to replace
                value:
                  description: Replacement value (parsed JSON object/array)
                yaml_fragment:
                  type: string
                  description: Replacement as a YAML string fragment
              required:
                - conversation_id
                - section
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: boolean
                  section:
                    type: string
        '404':
          description: No stored spec for conversation_id

  /entities-section:
    get:
      operationId: get_entities_section
      summary: Fetch one section from the stored entities dict
      description: |
        Returns a single section array (e.g. encounter_types, forms) from the stored
        entities so the agent can review or fix one section without loading all entities.
        Valid sections: subject_types, programs, encounter_types, address_levels, forms
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
        - name: section
          in: query
          required: true
          schema:
            type: string
          description: Entity section key
      responses:
        '200':
          description: Section items
          content:
            application/json:
              schema:
                type: object
                properties:
                  section:
                    type: string
                  items:
                    type: array
                  count:
                    type: integer
        '404':
          description: No stored entities for conversation_id
    put:
      operationId: update_entities_section
      summary: Replace one section in the stored entities dict
      description: |
        Surgical edit — replaces a single entity section and re-stores it.
        Use to fix one section (e.g. encounter_types) without re-extracting all entities.
        Valid sections: subject_types, programs, encounter_types, address_levels, forms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                section:
                  type: string
                  description: Entity section key to replace
                items:
                  type: array
                  description: Replacement array for the section
              required:
                - conversation_id
                - section
                - items
      responses:
        '200':
          description: Section updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: boolean
                  section:
                    type: string
                  count:
                    type: integer
        '404':
          description: No stored entities for conversation_id

  /bundle-file:
    get:
      operationId: get_bundle_file
      summary: Read the content of a specific file from a stored bundle
      description: |
        Returns parsed JSON content (or raw text) for the requested filename.
        filename examples: 'forms/MCH Registration.json', 'concepts.json',
        'subjectTypes.json', 'formMappings.json', 'programs.json'.
        If the file is not found, available_files is included in the error response
        so you can correct the filename. Use bundle_type='existing' to inspect the
        org's current config for comparison or post-upload diagnosis.
      parameters:
        - name: conversation_id
          in: query
          required: true
          schema:
            type: string
          description: Dify conversation ID
        - name: filename
          in: query
          required: true
          schema:
            type: string
          description: Path within the ZIP, e.g. 'forms/MCH Registration.json' or 'concepts.json'
        - name: bundle_type
          in: query
          required: false
          schema:
            type: string
            enum: [generated, existing]
            default: generated
          description: Which bundle to read from
      responses:
        '200':
          description: File content
          content:
            application/json:
              schema:
                type: object
                properties:
                  filename:
                    type: string
                  bundle_type:
                    type: string
                  size_bytes:
                    type: integer
                  content:
                    description: Parsed JSON object/array or raw string
        '404':
          description: File not found in bundle or no stored bundle for conversation_id
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  available_files:
                    type: array
                    items:
                      type: string
    put:
      operationId: put_bundle_file
      summary: Replace one file in the stored generated bundle ZIP
      description: |
        Opens the stored generated bundle ZIP, replaces the specified file with the
        provided content, and re-stores it. Use this for surgical bundle fixes after
        validate_bundle reports errors — fix one file, re-validate, re-upload.
        content can be a JSON object (auto-serialised) or a raw string.
        Only works on bundle_type='generated'.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                filename:
                  type: string
                  description: Path within the ZIP, e.g. 'forms/ANCForm.json'
                content:
                  description: Replacement content — JSON object/array or string
              required:
                - conversation_id
                - filename
                - content
      responses:
        '200':
          description: File updated in bundle
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: boolean
                  filename:
                    type: string
                  size_bytes:
                    type: integer
        '404':
          description: No stored bundle for conversation_id
        '413':
          description: Content too large to patch inline — regenerate the bundle instead

  /agent-log:
    post:
      operationId: append_agent_log
      summary: Append a step trace entry to the agent activity log
      description: |
        Call this after every significant action (tool call, decision, error) to build
        a traceable history for the current conversation. Required by the agent rules.
        Entries are retained for 24 h and viewable at GET /agent-logs/{conversation_id}.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - conversation_id
                - action
              properties:
                conversation_id:
                  type: string
                  description: Dify conversation ID (sys.conversation_id)
                step:
                  type: integer
                  description: Sequential step counter (increment by 1 per log entry)
                phase:
                  type: string
                  description: Current workflow phase
                  enum: [entity_extraction, spec_generation, bundle_generation, bundle_fix, upload, done]
                action:
                  type: string
                  description: Human-readable description of what was just done
                tool:
                  type: string
                  description: Tool name called (if this log entry is for a tool call)
                status:
                  type: string
                  description: Outcome of this step
                  enum: [success, error, info]
                  default: info
                summary:
                  type: string
                  description: Brief key result (e.g. "stored=true, concepts=45, forms=8")
                error:
                  type: string
                  description: Error message when status=error
                tokens_used:
                  type: integer
                  description: Cumulative token count so far (from Dify sys.model_usage if available)
                model:
                  type: string
                  description: Model identifier used for this step
      responses:
        '200':
          description: Log entry appended
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  entry_count:
                    type: integer
                    description: Total log entries for this conversation so far

  /execute-python:
    post:
      operationId: execute_python
      summary: Execute Python code in a sandboxed environment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversation_id:
                  type: string
                  description: Conversation ID (required for authentication)
                code:
                  type: string
                  description: Python code to execute
                context:
                  type: object
                  description: Variables available in the execution context
              required:
                - conversation_id
                - code
      responses:
        '200':
          description: Execution result
          content:
            application/json:
              schema:
                type: object
                properties:
                  output:
                    type: string
                  result:
                    type: object
                  error:
                    type: string
