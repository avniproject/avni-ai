    - data:
        code: "import json\n\ndef main(entities_jsonl, corrections_str: str):\n  \
          \  # entities_jsonl is a dict with keys: subject_types, programs, encounter_types,\
          \ address_levels\n    if isinstance(entities_jsonl, str):\n        try:\n\
          \            entities_jsonl = json.loads(entities_jsonl)\n        except\
          \ (json.JSONDecodeError, TypeError):\n            entities_jsonl = {}\n\
          \    if not isinstance(entities_jsonl, dict):\n        entities_jsonl =\
          \ {}\n    result = dict(entities_jsonl)\n    try:\n        parsed = json.loads(corrections_str)\
          \ if isinstance(corrections_str, str) else corrections_str\n        if isinstance(parsed,\
          \ dict):\n            corrections = parsed.get(\"corrections\", [])\n  \
          \      elif isinstance(parsed, list):\n            corrections = parsed\n\
          \        else:\n            corrections = []\n    except (json.JSONDecodeError,\
          \ TypeError):\n        return {\"result\": result}\n    if not corrections:\n\
          \        return {\"result\": result}\n    SECTION_MAP = {\"subject_type\"\
          : \"subject_types\", \"program\": \"programs\", \"encounter_type\": \"encounter_types\"\
          , \"address_level\": \"address_levels\"}\n    for correction in corrections:\n\
          \        if not isinstance(correction, dict):\n            continue\n  \
          \      section_key = SECTION_MAP.get(correction.get(\"entity_type\", \"\"\
          ).lower(), correction.get(\"entity_type\", \"\"))\n        if not section_key\
          \ or section_key not in result:\n            continue\n        c_name =\
          \ correction.get(\"name\", \"\")\n        entities = result[section_key]\n\
          \        if correction.get(\"_delete\"):\n            result[section_key]\
          \ = [e for e in entities if e.get(\"name\") != c_name]\n            continue\n\
          \        matched_idx = next((i for i, e in enumerate(entities) if e.get(\"\
          name\") == c_name), None)\n        payload = {k: v for k, v in correction.items()\
          \ if k not in (\"entity_type\", \"_delete\")}\n        if matched_idx is\
          \ not None:\n            result[section_key][matched_idx].update(payload)\n\
          \        else:\n            result[section_key].append(payload)\n    return\
          \ {\"result\": result}\n"
