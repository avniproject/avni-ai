    - data:
        code: "def _fuzzy_match(name, known_names):\n    lower = name.strip().lower()\n\
          \    for known in known_names:\n        if lower == known.lower() or lower\
          \ in known.lower() or known.lower() in lower:\n            return True\n\
          \    return False\n\ndef main(extracted_entities: dict):\n    st_rows =\
          \ extracted_entities.get(\"subject_types\", [])\n    prog_rows = extracted_entities.get(\"\
          programs\", [])\n    enc_rows = extracted_entities.get(\"encounter_types\"\
          , [])\n    addr_rows = extracted_entities.get(\"address_levels\", [])\n\
          \    subject_type_names = {r[\"name\"] for r in st_rows if r.get(\"name\"\
          )}\n    program_names = {r[\"name\"] for r in prog_rows if r.get(\"name\"\
          )}\n    issues = []\n\n    seen = {}\n    for r in st_rows:\n        key\
          \ = r.get(\"name\", \"\").strip().lower()\n        if not key: continue\n\
          \        if key in seen:\n            issues.append({\"severity\": \"error\"\
          , \"entity_type\": \"subject_type\", \"message\": f\"Duplicate subject type:\
          \ '{r['name']}'\"})\n        else:\n            seen[key] = r[\"name\"]\n\
          \n    for r in st_rows:\n        if not r.get(\"type\"):\n            issues.append({\"\
          severity\": \"warning\", \"entity_type\": \"subject_type\", \"message\"\
          : f\"Subject type '{r.get('name', '?')}' is missing 'type'\"})\n\n    seen\
          \ = {}\n    for r in prog_rows:\n        key = r.get(\"name\", \"\").strip().lower()\n\
          \        if not key: continue\n        if key in seen:\n            issues.append({\"\
          severity\": \"error\", \"entity_type\": \"program\", \"message\": f\"Duplicate\
          \ program: '{r['name']}'\"})\n        else:\n            seen[key] = r[\"\
          name\"]\n\n    for r in prog_rows:\n        target = r.get(\"target_subject_type\"\
          , \"\")\n        if not target:\n            issues.append({\"severity\"\
          : \"warning\", \"entity_type\": \"program\", \"message\": f\"Program '{r['name']}'\
          \ missing target subject type\"})\n        elif not _fuzzy_match(target,\
          \ subject_type_names):\n            issues.append({\"severity\": \"warning\"\
          , \"entity_type\": \"program\", \"message\": f\"Program '{r['name']}' references\
          \ unknown subject type '{target}'\"})\n\n    for r in enc_rows:\n      \
          \  if r.get(\"is_program_encounter\"):\n            program = r.get(\"program_name\"\
          , \"\")\n            if program and not _fuzzy_match(program, program_names):\n\
          \                issues.append({\"severity\": \"warning\", \"entity_type\"\
          : \"program_encounter\", \"message\": f\"Program encounter '{r['name']}'\
          \ references unknown program '{program}'\"})\n        else:\n          \
          \  subject = r.get(\"subject_type\", \"\")\n            if subject and not\
          \ _fuzzy_match(subject, subject_type_names):\n                issues.append({\"\
          severity\": \"warning\", \"entity_type\": \"encounter\", \"message\": f\"\
          Encounter '{r['name']}' references unknown subject type '{subject}'\"})\n\
          \n    if not addr_rows:\n        issues.append({\"severity\": \"warning\"\
          , \"entity_type\": \"location_hierarchy\", \"message\": \"No location hierarchy\
          \ found.\"})\n\n    error_count = sum(1 for i in issues if i[\"severity\"\
          ] == \"error\")\n    warning_count = sum(1 for i in issues if i[\"severity\"\
          ] == \"warning\")\n    if not issues:\n        issues_summary = \"No issues\
          \ found. All entities look good.\"\n    else:\n        lines = []\n    \
          \    for i in issues:\n            prefix = \"ERROR\" if i[\"severity\"\
          ] == \"error\" else \"WARNING\"\n            lines.append(f\"[{prefix}]\
          \ {i['message']}\")\n        issues_summary = \"\\n\".join(lines)\n\n  \
          \  return {\"output\": {\"entities\": extracted_entities, \"issues_summary\"\
          : issues_summary, \"error_count\": error_count, \"warning_count\": warning_count}}"
