    - data:
        code: "import json\n\ndef main(files: list) -> dict:\n    infos = [\n    \
          \    {\"url\": f.get(\"url\", \"\"), \"filename\": f.get(\"filename\", \"\
          document.xlsx\")}\n        for f in files\n        if f.get(\"url\")\n \
          \   ]\n    return {\"file_infos_json\": json.dumps(infos)}\n"
        code_language: python3
        desc: Extract pre-signed URLs and filenames — backend downloads the files
        outputs:
          file_infos_json:
            type: string
        selected: false
        title: Extract File Infos
        type: code
        variables:
        - value_selector:
          - sys
          - files
          variable: files
      height: 96
      id: '1775800000001'
      position:
