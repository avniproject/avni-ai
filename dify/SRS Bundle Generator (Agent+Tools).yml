        type: http-request
        url: '{{#conversation.avni_mcp_server_url#}}store-srs-text'
        variables: []
      height: 141
      id: '1775644994030'
      position:
        x: 597.4285714285714
        y: 52.71428571428571
      positionAbsolute:
        x: 597.4285714285714
        y: 52.71428571428571
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        agent_parameters:
          instruction:
            type: constant
            value: 'You are the AVNI SRS Bundle Generator Agent. You help users create
              complete AVNI configuration bundles from SRS specifications.


              Conversation ID: {{#sys.conversation_id#}}

              IMPORTANT: Use conversation_id (= {{#sys.conversation_id#}}) for ALL
              tool calls that need it.


              CRITICAL TOOL-CALL RULES (these override any conflicting instructions
              below):

              RULE 1 — FIRST TOOL CALL IS ALWAYS get_srs_text: At the very start
              of EVERY new SRS processing task, your first tool call MUST be
              get_srs_text(conversation_id). Do not show a plan, do not ask the
              user anything, do not say "let me retrieve" — just call the tool
              immediately. If it returns ok (200), use the srs_text field as your
              SRS input. If it returns 404 (no file uploaded), only then ask the
              user to paste the SRS text. After retrieving the text, call
              store_entities, then validate_entities, then generate_spec, then
              get_spec IN SEQUENCE without pausing. Only after get_spec returns do
              you show spec_yaml and ask for approval.

              RULE 2 — generate_bundle uses conversation_id ONLY: When the user
              approves the spec, call generate_bundle(conversation_id) without any
              entities field. Entities are already in the server store from RULE 1.

              RULE 3 — validate_bundle uses conversation_id ONLY: Call validate_bundle(conversation_id).
              Do NOT pass bundle_zip_b64.

              RULE 4 — upload_bundle uses conversation_id ONLY: Call upload_bundle(conversation_id).
              Do NOT pass bundle_zip_b64.


              {{#1775646587226.body#}}'
          maximum_iterations:
            type: constant
            value: 20
          model:
            type: constant
            value:
              completion_params:
                context_1m: true
                max_tokens: 16384
                prompt_caching_tool_definitions: true
                prompt_caching_tool_results: true
                temperature: 0.2
              mode: chat
              model: claude-opus-4-6
              model_type: llm
              provider: langgenius/anthropic/anthropic
              type: model-selector
          query:
            type: constant
            value: "{{#sys.query#}}"
          tools:
            type: constant
            value:
            - enabled: false
              extra:
                description: Call this once at the start of a conversation. All subsequent
                  tool calls that need auth can just pass conversation_id instead
                  of the avni-auth-token header.
              parameters:
                auth_token:
                  auto: 0
                  value:
                    type: mixed
                    value: null
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Call this once at the start of a conversation. All
                subsequent tool calls that need auth can just pass conversation_id
                instead of the avni-auth-token header.
              tool_label: store_auth_token
              tool_name: store_auth_token
              type: api
            - enabled: true
              extra:
                description: Call this once after entity extraction. Agent tools can
                  then pass only conversation_id instead of the full entities payload.
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
                entities:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Call this once after entity extraction. Agent tools
                can then pass only conversation_id instead of the full entities payload.
              tool_label: store_entities
              tool_name: store_entities
              type: api
            - enabled: true
              extra:
                description: Validate extracted entities for structural issues
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Validate extracted entities for structural issues
              tool_label: validate_entities
              tool_name: validate_entities
              type: api
            - enabled: true
              extra:
                description: Apply corrections to extracted entities
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
                corrections:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Apply corrections to extracted entities
              tool_label: apply_entity_corrections
              tool_name: apply_entity_corrections
              type: api
            - enabled: true
              extra:
                description: Generate a human-readable YAML spec from entities
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
                org_name:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#n-start.org_name#}}'
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Generate a human-readable YAML spec from entities
              tool_label: generate_spec
              tool_name: generate_spec
              type: api
            - enabled: true
              extra:
                description: Validate a YAML spec for structural and cross-reference
                  errors
              parameters:
                spec_yaml:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Validate a YAML spec for structural and cross-reference
                errors
              tool_label: validate_spec
              tool_name: validate_spec
              type: api
            - enabled: true
              extra:
                description: Convert a YAML spec to a full entities dict for bundle
                  generation
              parameters:
                spec_yaml:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Convert a YAML spec to a full entities dict for bundle
                generation
              tool_label: spec_to_entities
              tool_name: spec_to_entities
              type: api
            - enabled: true
              extra:
                description: Convert an existing bundle to a human-readable YAML spec
              parameters:
                bundle:
                  auto: 1
                  value: null
                org_name:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#n-start.org_name#}}'
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Convert an existing bundle to a human-readable YAML
                spec
              tool_label: bundle_to_spec
              tool_name: bundle_to_spec
              type: api
            - enabled: true
              extra:
                description: Generate a complete Avni bundle ZIP. Pass conversation_id
                  only — entities are fetched automatically from the server-side entity
                  store (populated by store_entities). Bundle is stored server-side;
                  no large payload is returned to the LLM.
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
                org_name:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#n-start.org_name#}}'
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Generate a complete Avni bundle ZIP from entities
              tool_label: generate_bundle
              tool_name: generate_bundle
              type: api
            - enabled: true
              extra:
                description: Validate the generated bundle for structural correctness.
                  Pass conversation_id to fetch the bundle from server-side store (no
                  large payload sent to LLM).
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Validate a generated bundle for structural correctness
              tool_label: validate_bundle
              tool_name: validate_bundle
              type: api
            - enabled: true
              extra:
                description: Patch the existing org bundle with the new spec. Pass
                  conversation_id (existing bundle fetched from server store) and
                  spec_yaml. The patched result is stored under conversation_id for
                  validate_bundle and upload_bundle to use.
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
                spec_yaml:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Decodes the existing bundle, generates a fresh bundle
                from the spec, and applies patches (voiding stale forms/mappings).
              tool_label: patch_bundle
              tool_name: patch_bundle
              type: api
            - enabled: true
              extra:
                description: Upload the generated bundle to Avni. Auth and bundle are
                  both resolved automatically from server-side store using conversation_id.
                  No bundle_zip_b64 needed.
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Auth is resolved automatically if conversation_id
                is provided and a token was stored via /store-auth-token. Otherwise
                pass avni-auth-token header.
              tool_label: upload_bundle
              tool_name: upload_bundle
              type: api
            - enabled: true
              extra:
                description: Check the status of a bundle upload task
              parameters:
                task_id:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Check the status of a bundle upload task
              tool_label: upload_status
              tool_name: upload_status
              type: api
            - enabled: true
              extra:
                description: Download the current organisation configuration from
                  Avni
              parameters:
                includeLocations:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Download the current organisation configuration from
                Avni
              tool_label: get_existing_config
              tool_name: get_existing_config
              type: api
            - enabled: true
              extra:
                description: Download the current org bundle from Avni and store it
                  server-side under conversation_id (bundle_type='existing'). Pass
                  conversation_id so the bundle ZIP never reaches the LLM. Afterwards
                  use get_bundle_files/get_bundle_file to inspect it, or patch_bundle
                  to apply spec changes.
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
                includeLocations:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Auth is resolved automatically if conversation_id
                is provided and a token was stored via /store-auth-token.
              tool_label: download_bundle_b64
              tool_name: download_bundle_b64
              type: api
            - enabled: true
              extra:
                description: Execute Python code in a sandboxed environment
              parameters:
                code:
                  auto: 1
                  value: null
                context:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Execute Python code in a sandboxed environment
              tool_label: execute_python
              tool_name: execute_python
              type: api
            - enabled: true
              extra:
                description: List all files in a stored bundle with their sizes. Use
                  bundle_type='generated' (default) for the newly generated bundle
                  or 'existing' for the org's current bundle downloaded from Avni.
                  Returns file names and sizes so you can choose which file to inspect.
              parameters:
                bundle_type:
                  auto: 1
                  value: null
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: List all files in a stored bundle with their sizes.
              tool_label: get_bundle_files
              tool_name: get_bundle_files
              type: api
            - enabled: true
              extra:
                description: Read the content of a specific file from a stored bundle.
                  filename examples are 'forms/MCH Registration.json', 'concepts.json',
                  'subjectTypes.json', 'formMappings.json'. Use bundle_type='existing'
                  to inspect the org's current config for comparison or diagnosis.
              parameters:
                bundle_type:
                  auto: 1
                  value: null
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
                filename:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Read the content of a specific file from a stored
                bundle by filename.
              tool_label: get_bundle_file
              tool_name: get_bundle_file
              type: api
            - enabled: true
              extra:
                description: Retrieve the full stored spec YAML for display. Call
                  this after generate_spec confirms stored=true. Shows spec_yaml
                  in the agent response for user review.
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Retrieve the full stored spec YAML for display to
                the user after generate_spec confirms stored=true.
              tool_label: get_spec
              tool_name: get_spec
              type: api
            - enabled: true
              extra:
                description: Fetch one section array from stored entities (e.g.
                  encounter_types, forms). Use for targeted review or edit of one
                  section without loading all entities. Valid sections — subject_types,
                  programs, encounter_types, address_levels, forms.
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
                section:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Fetch one section array from the stored entities
                dict for targeted inspection or edit.
              tool_label: get_entities_section
              tool_name: get_entities_section
              type: api
            - enabled: true
              extra:
                description: Replace one section in the stored entities dict and
                  re-store it. Use to fix just encounter_types, forms, or any other
                  section without re-extracting all entities. Always validate_entities
                  after this call.
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
                section:
                  auto: 1
                  value: null
                items:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
              provider_show_name: Avni AI Staging NoAuth openapi
              settings: {}
              tool_description: Replace one section in the stored entities dict (surgical
                edit without full re-extraction).
              tool_label: update_entities_section
              tool_name: update_entities_section
              type: api
            - enabled: true
              extra:
                description: Fetch one top-level section from the stored spec YAML
                  (e.g. encounterTypes, programs, subjectTypes). Allows targeted
                  review or edit of one section without retrieving the full spec.
              parameters:
                conversation_id:
                  auto: 0
                  value:
                    type: mixed
                    value: '{{#sys.conversation_id#}}'
                section:
                  auto: 1
                  value: null
              provider_name: 7f9b21ca-bafb-43f6-8294-4357a954d50d
