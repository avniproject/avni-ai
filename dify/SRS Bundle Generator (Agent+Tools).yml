app:
  description: SRS Bundle Generator with avni-ai backend tools for entity extraction,
    validation, and bundle generation
  icon: 📦
  icon_background: '#E7F3F8'
  icon_type: emoji
  mode: advanced-chat
  name: SRS Bundle Generator (Agent+Tools)
  use_icon_as_answer_icon: true
dependencies: []
kind: app
version: 0.6.0
workflow:
  conversation_variables:
  - description: ''
    id: a1d26303-4267-47ef-8662-2b246b1079f1
    name: uploaded_files
    selector:
    - conversation
    - uploaded_files
    value: []
    value_type: array[object]
  - description: ''
    id: 0afa1396-e90b-4bbe-aa59-9f4e870a4792
    name: auth_token
    selector:
    - conversation
    - auth_token
    value: ''
    value_type: string
  - description: ''
    id: 93cecf97-c283-40f6-a8bd-efd306bd94b1
    name: avni_mcp_server_url
    selector:
    - conversation
    - avni_mcp_server_url
    value: https://staging-ai.avniproject.org/
    value_type: string
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .xlsx
      - .csv
      - .json
      - .zip
      - .txt
      allowed_file_types:
      - document
      - custom
      allowed_file_upload_methods:
      - local_file
      enabled: true
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 50
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: 'I''m the AVNI SRS Bundle Generator.


      1. Paste your SRS or upload Excel

      2. I''ll extract entities and validate

      3. Generate a YAML spec for your review

      4. Generate the bundle ZIP on approval


      What''s your SRS?'
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - Generate a bundle for an MCH program
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
