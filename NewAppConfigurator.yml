    # ─── FILE_SETUP: Entities Corrector Code ───────────────────────
    - data:
        code: |
          import json

          def main(entities_jsonl: list, corrections_str: str):
              entities = list(entities_jsonl) if entities_jsonl else []
              try:
                  parsed = json.loads(corrections_str) if isinstance(corrections_str, str) else corrections_str
                  if isinstance(parsed, dict):
                      corrections = parsed.get("corrections", [])
                  elif isinstance(parsed, list):
                      corrections = parsed
                  else:
                      corrections = []
              except (json.JSONDecodeError, TypeError):
                  return {"result": entities}
              if not corrections:
                  return {"result": entities}
              for correction in corrections:
                  if not isinstance(correction, dict):
                      continue
                  if correction.get("_delete"):
                      name = correction.get("name", "")
                      entity_type = correction.get("type", "")
                      for i, entity in enumerate(entities):
                          if entity.get("type") == entity_type and entity.get("name") == name:
                              entities.pop(i)
                              break
                      continue
                  c_type = correction.get("type", "")
                  c_name = correction.get("name", "")
                  matched_idx = None
                  for i, entity in enumerate(entities):
                      if entity.get("type") == c_type and entity.get("name") == c_name:
                          matched_idx = i
                          break
                  if matched_idx is not None:
                      entities[matched_idx] = correction
                  else:
                      entities.append(correction)
              return {"result": entities}
        code_language: python3
        outputs:
          result:
            children: null
            type: "array[object]"
        title: Entities Corrector
        type: code
        variables:
        - value_selector: [conversation, entities_jsonl]
          value_type: string
          variable: entities_jsonl
        - value_selector: ['1773981975918', structured_output]
          value_type: object
          variable: corrections_str
