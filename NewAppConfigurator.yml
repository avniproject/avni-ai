    # === OUT_OF_SCOPE PATH ===
    - {source: '1757493270484', sourceHandle: 'case-oos', target: '1758699378772', targetHandle: target, data: {sourceType: if-else, targetType: answer}}

    # === ASSISTANT PATH ===
