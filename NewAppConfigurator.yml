    # Check upload status
    - data:
        code: |
          import json
          import requests
          from typing import Dict, Any

          def check_upload_status(task_id: str, avni_mcp_server_url: str) -> Dict[str, Any]:
              session = requests.Session()
              status_url = f"{avni_mcp_server_url}upload-status/{task_id}"
              try:
                  response = session.get(status_url, timeout=10)
                  if response.status_code != 200:
                      return {"error": f"HTTP {response.status_code}", "task_id": task_id}
                  return response.json()
              except requests.exceptions.RequestException as e:
                  return {"error": str(e), "task_id": task_id}

          def main(upload_response: Dict[str, Any], avni_mcp_server_url: str):
              task_id = upload_response.get("task_id", "")
              result = check_upload_status(task_id, avni_mcp_server_url)
              status = result.get("status", "")
              is_terminal = status in ["completed", "failed"]
              return {"output": result, "is_terminal": is_terminal}
        code_language: python3
        outputs:
          output: {type: object}
          is_terminal: {type: boolean}
        title: Check Upload Status
        type: code
        variables:
        - value_selector: ['upload-bundle-req', body]
          value_type: object
          variable: upload_response
        - value_selector: [conversation, avni_mcp_server_url]
          value_type: string
          variable: avni_mcp_server_url
      id: 'check-upload-status'
      position: {x: 5020, y: 1112}
      type: custom

