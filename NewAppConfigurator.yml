    # First time: Doc Extractor → Entity Extractor → Save → Ambiguity → Summary
    - {source: 'fs-check-processed', sourceHandle: 'case-false', target: '1774264909113', targetHandle: target, data: {sourceType: if-else, targetType: document-extractor}}
    - {source: '1774264909113', sourceHandle: source, target: '1774264840300', targetHandle: target, data: {sourceType: document-extractor, targetType: llm}}
    - {source: '1774264840300', sourceHandle: source, target: 'fs-save-jsonl', targetHandle: target, data: {sourceType: llm, targetType: assigner}}
    - {source: 'fs-save-jsonl', sourceHandle: source, target: '1773908701222', targetHandle: target, data: {sourceType: assigner, targetType: code}}
    - {source: '1773908701222', sourceHandle: source, target: '1773909315118', targetHandle: target, data: {sourceType: code, targetType: llm}}
    - {source: '1773909315118', sourceHandle: source, target: '1773909436902', targetHandle: target, data: {sourceType: llm, targetType: answer}}
    - {source: '1773909436902', sourceHandle: source, target: 'fs-human-input', targetHandle: target, data: {sourceType: answer, targetType: human-input}}

    # Already processed: Corrector flow
    - {source: 'fs-check-processed', sourceHandle: 'case-true', target: '1773981975918', targetHandle: target, data: {sourceType: if-else, targetType: llm}}
    - {source: '1773981975918', sourceHandle: source, target: '1773982043351', targetHandle: target, data: {sourceType: llm, targetType: code}}
    - {source: '1773982043351', sourceHandle: source, target: '1773984373385', targetHandle: target, data: {sourceType: code, targetType: assigner}}
    - {source: '1773984373385', sourceHandle: source, target: '1774002885641', targetHandle: target, data: {sourceType: assigner, targetType: llm}}
    - {source: '1774002885641', sourceHandle: source, target: '1773909436902', targetHandle: target, data: {sourceType: llm, targetType: answer}}

    # Human Input → Yes → Generate Bundle
    - {source: 'fs-human-input', sourceHandle: 'case-yes', target: 'generate-bundle-req', targetHandle: target, data: {sourceType: human-input, targetType: http-request}}
