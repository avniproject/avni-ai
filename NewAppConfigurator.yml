    # Orchestrator → Main Router
    - {source: '1757492907627', sourceHandle: source, target: '1757493270484', targetHandle: target, data: {sourceType: llm, targetType: if-else}}

    # === RAG PATH ===
    - {source: '1757493270484', sourceHandle: 'case-rag', target: '1757495664531', targetHandle: target, data: {sourceType: if-else, targetType: llm}}
    - {source: '1757495664531', sourceHandle: source, target: '1757495688732', targetHandle: target, data: {sourceType: llm, targetType: answer}}

