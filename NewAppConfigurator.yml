    # ─── FILE_SETUP: Ambiguity Checker ─────────────────────────────
    - data:
        code: |
          def _fuzzy_match(name, known_names):
              lower = name.strip().lower()
              for known in known_names:
                  if lower == known.lower() or lower in known.lower() or known.lower() in lower:
                      return True
              return False

          def main(extracted_entities: dict):
              st_rows = extracted_entities.get("subject_types", [])
              prog_rows = extracted_entities.get("programs", [])
              enc_rows = extracted_entities.get("encounter_types", [])
              addr_rows = extracted_entities.get("address_levels", [])
              subject_type_names = {r["name"] for r in st_rows if r.get("name")}
              program_names = {r["name"] for r in prog_rows if r.get("name")}
              issues = []

              seen = {}
              for r in st_rows:
                  key = r.get("name", "").strip().lower()
                  if not key: continue
                  if key in seen:
                      issues.append({"severity": "error", "entity_type": "subject_type", "message": f"Duplicate subject type: '{r['name']}'"})
                  else:
                      seen[key] = r["name"]

              for r in st_rows:
                  if not r.get("type"):
                      issues.append({"severity": "warning", "entity_type": "subject_type", "message": f"Subject type '{r.get('name', '?')}' is missing 'type'"})

              seen = {}
              for r in prog_rows:
                  key = r.get("name", "").strip().lower()
                  if not key: continue
                  if key in seen:
                      issues.append({"severity": "error", "entity_type": "program", "message": f"Duplicate program: '{r['name']}'"})
                  else:
                      seen[key] = r["name"]

              for r in prog_rows:
                  target = r.get("target_subject_type", "")
                  if not target:
                      issues.append({"severity": "warning", "entity_type": "program", "message": f"Program '{r['name']}' missing target subject type"})
                  elif not _fuzzy_match(target, subject_type_names):
                      issues.append({"severity": "warning", "entity_type": "program", "message": f"Program '{r['name']}' references unknown subject type '{target}'"})

              for r in enc_rows:
                  if r.get("is_program_encounter"):
                      program = r.get("program_name", "")
                      if program and not _fuzzy_match(program, program_names):
                          issues.append({"severity": "warning", "entity_type": "program_encounter", "message": f"Program encounter '{r['name']}' references unknown program '{program}'"})
                  else:
                      subject = r.get("subject_type", "")
                      if subject and not _fuzzy_match(subject, subject_type_names):
                          issues.append({"severity": "warning", "entity_type": "encounter", "message": f"Encounter '{r['name']}' references unknown subject type '{subject}'"})

              if not addr_rows:
                  issues.append({"severity": "warning", "entity_type": "location_hierarchy", "message": "No location hierarchy found."})

              error_count = sum(1 for i in issues if i["severity"] == "error")
              warning_count = sum(1 for i in issues if i["severity"] == "warning")
              if not issues:
                  issues_summary = "No issues found. All entities look good."
              else:
                  lines = []
                  for i in issues:
                      prefix = "ERROR" if i["severity"] == "error" else "WARNING"
                      lines.append(f"[{prefix}] {i['message']}")
                  issues_summary = "\n".join(lines)

              return {"output": {"entities": extracted_entities, "issues_summary": issues_summary, "error_count": error_count, "warning_count": warning_count}}
        code_language: python3
        outputs:
          output: {type: object}
        title: Ambiguity Checker
        type: code
        variables:
