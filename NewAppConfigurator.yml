      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      - .XLSX
      - .XLS
      - .CSV
      allowed_file_types:
      - document
      - image
      allowed_file_upload_methods:
      - remote_url
      - local_file
      enabled: true
      fileUploadConfig:
        file_size_limit: 15
        batch_count_limit: 5
        workflow_file_upload_limit: 10
      number_limits: 5
    opening_statement: "Hey {{user_name}}! I\u2019m your Avni AI assistant. I can help\
      \ you with:\n\n\U0001F4DA **Learn about Avni** \u2014 Ask me anything about\
      \ the platform\n\U0001F4C4 **Set up your program** \u2014 Upload a Field Workflow\
      \ Specification and I\u2019ll configure everything\n\U0001F527 **Custom configuration**\
      \ \u2014 Build something unique\n\nHow can I help you today?"
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - "I want to set up a new program"
    - "What is Avni?"
    - "Upload my field workflow specification"
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false

  # ═══════════════════════════════════════════════════════════════════
  # NEW DIFY FLOW — REFACTORED FOR BUNDLE-FIRST ARCHITECTURE
  # ═══════════════════════════════════════════════════════════════════
  #
  # Flow Overview:
  #
  #   Start → Knowledge Retrieval → Orchestrator LLM → Router IF/ELSE
  #     ├─ RAG → RAG LLM → RAG Answer
  #     ├─ ASSISTANT → Assistant LLM → Assistant Answer
  #     ├─ FILE_SETUP (no existing entities) → Doc Extractor → Entity Extractor
  #     │    → Ambiguity Checker → Save Entities → Summary LLM → Human Confirm
  #     │    → Yes: Generate Bundle → Upload Bundle → Poll Status → Done
  #     │    → No: Ask Corrections → Entities Corrector LLM → Loop back
  #     ├─ FILE_SETUP (existing entities) → Entities Corrector → same confirm flow
  #     └─ OUT_OF_SCOPE → Out of Scope Answer
  #
  # Key Changes from Old Flow:
  #   1. REMOVED: /process-config-async + 20-iteration polling loop
  #   2. ADDED: /generate-bundle → /upload-bundle → /upload-status flow
  #   3. ADDED: Sample document link when user asks about program setup
  #   4. ADDED: Progress messages during bundle generation + upload
  #   5. ADDED: Idempotent updates (download existing bundle before re-upload)
  #
  # ═══════════════════════════════════════════════════════════════════

  graph:
