    # Completed → break loop
    - {source: 'upload-status-check', sourceHandle: 'case-true', target: 'break-upload-loop', targetHandle: target, data: {sourceType: if-else, targetType: assigner}}
    - {source: 'break-upload-loop', sourceHandle: source, target: 'upload-done-answer', targetHandle: target, data: {sourceType: assigner, targetType: answer}}
    # Not completed → progress answer
    - {source: 'upload-status-check', sourceHandle: 'case-false', target: 'upload-progress-answer', targetHandle: target, data: {sourceType: if-else, targetType: answer}}

    # Human Input → No → Ask Corrections
    - {source: 'fs-human-input', sourceHandle: 'case-no', target: 'fs-ask-corrections', targetHandle: target, data: {sourceType: human-input, targetType: answer}}

    # Human Input → Timeout
    - {source: 'fs-human-input', sourceHandle: 'case-timeout', target: 'fs-timeout', targetHandle: target, data: {sourceType: human-input, targetType: answer}}

    nodes:
    # ─── START NODE ─────────────────────────────────────────────────
    - data:
        title: Start
