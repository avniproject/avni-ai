          value: ['1711528708197', auth_token]
          variable_selector: [conversation, auth_token]
          write_mode: over-write
        title: Auth token var assigner
        type: assigner
        version: '2'
      id: '1774005484035'
      position: {x: 362, y: 780}
      type: custom

    # ─── KNOWLEDGE RETRIEVAL ───────────────────────────────────────
    - data:
        dataset_ids: []
        multiple_retrieval_config:
          reranking_enable: false
          reranking_mode: reranking_model
          top_k: 4
          weights:
            keyword_setting: {keyword_weight: 0.3}
            vector_setting: {vector_weight: 0.7}
        query_variable_selector: [sys, query]
        retrieval_mode: multiple
        single_retrieval_config:
          model:
            completion_params: {}
            mode: chat
            name: gpt-4o
            provider: langgenius/openai/openai
        title: Knowledge Retrieval
        type: knowledge-retrieval
      id: '1758713692744'
      position: {x: 342, y: 450}
      type: custom

    # ─── ORCHESTRATOR LLM ──────────────────────────────────────────
    - data:
        context:
          enabled: true
          variable_selector: ['1758713692744', result]
        model:
          completion_params:
            response_format: {type: json_object}
            temperature: 0.1
          mode: chat
          name: gpt-4o
          provider: langgenius/openai/openai
        prompt_template:
        - id: orchestrator-system
          role: system
          text: >
            You are the Avni Platform Orchestrator. Route user messages based on PRIMARY INTENT.


            <context>
            {{#context#}}
            </context>

            <user_uploaded_files>
            {{#sys.files#}}
            </user_uploaded_files>


            ## Routing Rules

            OVERRIDE RULES (check in order):
            1. NOT about Avni → OUT_OF_SCOPE
            2. File upload (.xlsx, .xls, .csv) or mentions uploading a spec/SRS/field workflow → FILE_SETUP
            3. "I want to set up a program" / "How do I set up" / setup guidance without a file → PROGRAM_SETUP_GUIDANCE
            4. Capability questions ("Is it possible", "Can Avni", "Does Avni support", "How can I") → RAG
            5. Implementation needs ("Build/create/develop", "Delete everything", "Clean slate") → ASSISTANT
            6. Greeting → RAG with clarification_needed=true


            ### PROGRAM_SETUP_GUIDANCE (NEW)
            When user wants to set up a program but hasn't uploaded a file yet.
            Response should guide them to upload a Field Workflow Specification.


            ## Response Format (JSON)

            {"service": "RAG|ASSISTANT|FILE_SETUP|PROGRAM_SETUP_GUIDANCE|OUT_OF_SCOPE",
             "confidence": 0.0-1.0,
             "question_type": "...",
             "routing_reason": "...",
             "clarification_needed": true|false,
             "clarifying_questions": []}
        structured_output_enabled: true
        structured_output_schema:
          properties:
            clarification_needed: {type: boolean}
            clarifying_questions: {items: {type: string}, type: array}
            confidence: {type: number}
            question_type: {type: string}
            routing_reason: {type: string}
            service: {type: string}
          required: [service, confidence]
          type: object
        title: Orchestrator
        type: llm
      id: '1757492907627'
      position: {x: 683, y: 451}
      type: custom

    # ─── MAIN ROUTER IF/ELSE ───────────────────────────────────────
    - data:
        cases:
        - case_id: case-clarify
          conditions:
          - comparison_operator: is
            value: 'true'
            variable_selector: ['1757492907627', structured_output, clarification_needed]
          logical_operator: and
        - case_id: case-rag
          conditions:
          - comparison_operator: is
            value: RAG
            variable_selector: ['1757492907627', structured_output, service]
          logical_operator: and
        - case_id: case-assistant
          conditions:
          - comparison_operator: is
            value: ASSISTANT
            variable_selector: ['1757492907627', structured_output, service]
          logical_operator: and
        - case_id: case-filesetup
          conditions:
          - comparison_operator: is
            value: FILE_SETUP
            variable_selector: ['1757492907627', structured_output, service]
          logical_operator: and
        - case_id: case-setup-guidance
          conditions:
          - comparison_operator: is
            value: PROGRAM_SETUP_GUIDANCE
            variable_selector: ['1757492907627', structured_output, service]
          logical_operator: and
        - case_id: case-oos
          conditions:
          - comparison_operator: is
            value: OUT_OF_SCOPE
            variable_selector: ['1757492907627', structured_output, service]
          logical_operator: and
        title: Main Router
        type: if-else
      id: '1757493270484'
      position: {x: 1024, y: 252}
      type: custom

    # ─── RAG PATH ──────────────────────────────────────────────────
    - data:
        context:
          enabled: true
          variable_selector: ['1758713692744', result]
        model:
          completion_params: {}
          mode: chat
          name: gpt-4o
          provider: langgenius/openai/openai
        prompt_template:
        - id: rag-system
          role: system
          text: >
            Use the context inside <context></context> tags as your knowledge.

            <context>
            {{#context#}}
            </context>

            You are talking to {{#1711528708197.user_name#}} from {{#1711528708197.org_name#}}.
            You are part of the Avni AI Assistant.

            Currently capable of:
            1. Answering questions about the Avni system
            2. Assistance with designing workflows, forms etc on Avni

            Not currently capable of:
            1. Helping with rules

            Rules:
            - If you don't know, say so. Don't guess or invent features.
            - If greeting, greet by name: {{#1711528708197.user_name#}}
            - Do not greet repeatedly.
            - If ambiguous, ask a clarifying question.
            - Answer in the user's language.
        title: RAG LLM
        type: llm
      id: '1757495664531'
      position: {x: 1385, y: 732}
      type: custom
    - data:
        answer: '{{#1757495664531.text#}}'
        title: RAG Answer
        type: answer
      id: '1757495688732'
      position: {x: 1726, y: 715}
      type: custom

    # ─── CLARIFICATION ANSWER ──────────────────────────────────────
    - data:
        answer: '{{#1757492907627.structured_output.clarifying_questions#}}'
        title: Clarify the question
        type: answer
      id: '1758608702077'
      position: {x: 1385, y: 306}
      type: custom

    # ─── OUT OF SCOPE ANSWER ───────────────────────────────────────
    - data:
        answer: "I'm sorry, that question doesn't seem to be related to Avni. I can\
          \ help you with:\n- Learning about Avni's features\n- Setting up programs\
          \ and forms\n- Configuring your Avni implementation\n\nHow can I help you\
          \ with Avni today?"
        title: Unrelated Question
        type: answer
      id: '1758699378772'
      position: {x: 1385, y: 522}
      type: custom

    # ─── PROGRAM SETUP GUIDANCE ANSWER (NEW) ───────────────────────
    - data:
        answer: "You can set up your program by uploading a **Field Workflow Specification**.\
          \ Here is a [sample field workflow specification document](https://docs.google.com/spreadsheets/d/1cEod2MbMtRvAcupArC4nZaHIYB2HHUrIIbOZR0uGRz8/edit?gid=262841117#gid=262841117)\
          \ that you can use as a template.\n\nOnce you fill it out, click the **+**\
          \ icon below to upload your file and I'll automatically create:\n- Location\
          \ hierarchy\n- Subject types\n- Programs\n- Encounter types\n- Forms and\
          \ form mappings\n\nI can also clarify any questions you have about filling\
          \ the document. What would you like to know?"
        title: Program Setup Guidance
        type: answer
      id: 'setup-guidance-answer'
      position: {x: 1385, y: 450}
      type: custom

    # ─── ASSISTANT PATH ────────────────────────────────────────────
    - data:
        context:
          enabled: false
          variable_selector: []
        model:
          completion_params:
            temperature: 0.3
          mode: chat
          name: gpt-4o
          provider: langgenius/openai/openai
        prompt_template:
        - id: assistant-system
          role: system
          text: >
            You are Avni Copilot, an expert assistant for the Avni data collection platform.
            Guide NGOs and implementers in designing Avni configurations.

            - Ask one simple question at a time
            - Org Type is {{#1711528708197.org_type#}}
            - If Org Type is "Production" or "UAT", tell user automatic configurations are not supported for their org type. Do not proceed.
            - If Org Type is "Trial", proceed with configuration.
            - You are talking to {{#1711528708197.user_name#}}
            - When user wants to create config, suggest uploading a Field Workflow Specification file instead.
        title: Assistant LLM
        type: llm
      id: '17580163919060'
      position: {x: 1385, y: 140}
      type: custom
    - data:
        answer: '{{#17580163919060.text#}}'
        title: Assistant Answer
        type: answer
      id: '1760358474156'
      position: {x: 2087, y: 0}
      type: custom

    # ─── FILE_SETUP: Already Processed? ────────────────────────────
    - data:
        cases:
        - case_id: case-true
          conditions:
          - comparison_operator: is_not
            value: '{}'
            variable_selector: [conversation, entities_jsonl]
          logical_operator: and
        title: Already Processed?
        type: if-else
      id: 'fs-check-processed'
      position: {x: 1385, y: 898}
      type: custom

    # ─── FILE_SETUP: Document Extractor ────────────────────────────
    - data:
        title: Doc Extractor
        type: document-extractor
        variable_selector: [sys, files]
      id: '1774264909113'
      position: {x: 1554, y: 1257}
      type: custom

    # ─── FILE_SETUP: Entity Extractor LLM ──────────────────────────
    - data:
        model:
          completion_params:
            response_format: {type: json_object}
            temperature: 0.1
          mode: chat
          name: gpt-4o
          provider: langgenius/openai/openai
        prompt_template:
        - id: entity-extractor-system
          role: system
          text: >
            You are an entity extraction assistant for the Avni platform. Extract ALL entities from the document content below.


            Document content:
            {{#1774264909113.text#}}


            Extract into 4 arrays: subject_types, programs, encounter_types, address_levels.

            Rules:
            - Subject types: name, type (Person|Individual|Household|Group|User), form_link, lowest_address_level
            - Programs: name, target_subject_type, enrolment_form, exit_form
            - Encounter types: name, program_name, subject_type, encounter_type (Scheduled|Unscheduled), is_program_encounter (bool), frequency
            - Address levels: name, level (int), parent (name or null). Topmost has highest level number.
            - Only extract from defined tables. Don't create entities just because they're referenced.
            - Ignore nan values. Trim whitespace. Use actual booleans not strings.

            Output as JSON: {"subject_types": [...], "programs": [...], "encounter_types": [...], "address_levels": [...]}
        structured_output_enabled: true
        structured_output_schema:
          properties:
            address_levels: {items: {type: object}, type: array}
            encounter_types: {items: {type: object}, type: array}
            programs: {items: {type: object}, type: array}
            subject_types: {items: {type: object}, type: array}
          type: object
        title: Entity Extractor
        type: llm
      id: '1774264840300'
      position: {x: 1843, y: 1232}
      type: custom

    # ─── FILE_SETUP: Save Entities JSONL ───────────────────────────
    - data:
        items:
        - input_type: variable
          operation: over-write
