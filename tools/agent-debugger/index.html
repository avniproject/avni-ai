<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avni Bundle Agent Debugger</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #0d1117; color: #c9d1d9; font-size: 13px; }
  .app { max-width: 1200px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 18px; color: #58a6ff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  h1 span { font-size: 12px; color: #8b949e; font-weight: normal; }

  /* Config panel */
  .config { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .config-row { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  .config-row label { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px; color: #8b949e; font-size: 11px; }
  .config-row input, .config-row textarea { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 8px; color: #c9d1d9; font-family: inherit; font-size: 12px; }
  .config-row textarea { min-height: 80px; resize: vertical; }
  .btn { background: #238636; color: #fff; border: none; border-radius: 6px; padding: 10px 24px; cursor: pointer; font-weight: 600; font-size: 13px; }
  .btn:hover { background: #2ea043; }
  .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  .btn-row { display: flex; gap: 12px; align-items: center; margin-top: 8px; }
  .file-upload { display: flex; align-items: center; gap: 8px; }
  .file-upload input[type="file"] { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 6px; color: #c9d1d9; font-size: 12px; }
  .file-name { color: #3fb950; font-size: 12px; }

  /* Stats bar */
  .stats { display: flex; gap: 16px; padding: 10px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-val { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 10px; color: #8b949e; text-transform: uppercase; }
  .stat-val.green { color: #3fb950; }
  .stat-val.red { color: #f85149; }
  .stat-val.yellow { color: #d29922; }
  .stat-val.blue { color: #58a6ff; }

  /* Step feed */
  .feed { display: flex; flex-direction: column; gap: 4px; }

  .event { border: 1px solid #30363d; border-radius: 6px; overflow: hidden; }
  .event-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; user-select: none; }
  .event-header:hover { background: #1c2128; }
  .event-icon { font-size: 16px; flex-shrink: 0; }
  .event-name { font-weight: 600; color: #e6edf3; }
  .event-phase { font-size: 10px; padding: 2px 6px; border-radius: 10px; text-transform: uppercase; font-weight: 600; }
  .phase-setup { background: #1f2937; color: #9ca3af; }
  .phase-extract { background: #1e3a5f; color: #58a6ff; }
  .phase-spec { background: #2d1f4e; color: #bc8cff; }
  .phase-bundle { background: #1f3d1f; color: #3fb950; }
  .phase-upload { background: #3d2f1f; color: #d29922; }
  .phase-correction { background: #3d1f2f; color: #f78166; }
  .phase-other { background: #1f2937; color: #8b949e; }
  .event-meta { margin-left: auto; display: flex; gap: 12px; align-items: center; font-size: 11px; color: #8b949e; }
  .event-duration { color: #8b949e; }
  .event-size { color: #8b949e; }
  .event-size.warn { color: #d29922; font-weight: 700; }
  .event-body { padding: 0 12px 12px; }
  .json-block { background: #0d1117; border: 1px solid #21262d; border-radius: 4px; padding: 8px; overflow-x: auto; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; font-size: 11px; line-height: 1.5; }
  .json-block.args { border-left: 3px solid #58a6ff; }
  .json-block.result { border-left: 3px solid #3fb950; }
  .json-block.result.error { border-left: 3px solid #f85149; }
  .section-label { font-size: 10px; color: #8b949e; text-transform: uppercase; margin: 8px 0 4px; letter-spacing: 0.5px; }

  /* Agent message */
  .agent-msg { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px; line-height: 1.6; white-space: pre-wrap; }

  /* Info/error events */
  .info-event { padding: 6px 12px; color: #8b949e; font-size: 12px; }
  .error-event { padding: 8px 12px; background: #1c0d0d; border: 1px solid #f8514933; border-radius: 6px; color: #f85149; }

  /* Turn marker */
  .turn-marker { display: flex; align-items: center; gap: 8px; padding: 6px 0; color: #484f58; font-size: 11px; }
  .turn-marker hr { flex: 1; border: none; border-top: 1px solid #21262d; }

  /* Done banner */
  .done-banner { padding: 12px 16px; border-radius: 8px; font-weight: 600; margin-top: 8px; }
  .done-banner.success { background: #0d2818; border: 1px solid #238636; color: #3fb950; }
  .done-banner.fail { background: #1c0d0d; border: 1px solid #f85149; color: #f85149; }

  /* User reply / auto-reply */
  .auto-reply { padding: 8px 12px; background: #1a2332; border: 1px solid #1f6feb33; border-radius: 6px; color: #58a6ff; font-size: 12px; }
  .auto-reply::before { content: "AUTO-REPLY: "; font-weight: 700; }
  .user-reply-box { padding: 8px 12px; background: #161b22; border: 1px solid #d2992233; border-radius: 6px; }
  .user-reply-box .label { color: #d29922; font-size: 11px; font-weight: 600; margin-bottom: 6px; }
  .user-reply-box .input-row { display: flex; gap: 8px; }
  .user-reply-box input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 8px; color: #c9d1d9; font-family: inherit; font-size: 12px; }
  .user-reply-box .btn-sm { background: #d29922; color: #000; border: none; border-radius: 4px; padding: 8px 16px; cursor: pointer; font-weight: 600; font-size: 12px; }
  .user-reply-sent { padding: 6px 12px; color: #3fb950; font-size: 12px; background: #0d2818; border: 1px solid #23863633; border-radius: 6px; }
  .user-reply-sent::before { content: "YOU: "; font-weight: 700; }

  /* Spinner */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function App() {
  const [config, setConfig] = useState({
    anthropicApiKey: "",
    authToken: "",
    serverUrl: "http://localhost:8023",
    srsText: "",
    orgName: "test-skills",
    filePaths: "tests/resources/scoping/Durga India Modelling.xlsx\ntests/resources/scoping/Durga India Scoping Document.xlsx",
  });
  const [fileNames, setFileNames] = useState([]);

  const parseOneFile = async (file) => {
    if (file.name.endsWith(".txt") || file.name.endsWith(".csv")) {
      const text = await file.text();
      return `=== File: ${file.name} ===\n${text}`;
    }
    // Excel file — parse all sheets
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });
    const parts = [];
    for (const sheetName of wb.SheetNames) {
      const ws = wb.Sheets[sheetName];
      const csv = XLSX.utils.sheet_to_csv(ws, { blankrows: false });
      if (csv.trim()) {
        parts.push(`=== File: ${file.name} | Sheet: ${sheetName} ===\n${csv}`);
      }
    }
    return parts.join("\n\n");
  };

  const handleFileUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setFileNames(files.map(f => f.name));

    const allParts = [];
    for (const file of files) {
      const text = await parseOneFile(file);
      if (text.trim()) allParts.push(text);
    }
    const fullText = allParts.join("\n\n---\n\n");
    setConfig(prev => ({ ...prev, srsText: fullText }));
  };
  const [events, setEvents] = useState([]);
  const [running, setRunning] = useState(false);
  const [expanded, setExpanded] = useState({});
  const [waitingForUser, setWaitingForUser] = useState(false);
  const [replyText, setReplyText] = useState("");
  const feedRef = useRef(null);
  const wsRef = useRef(null);

  // Stats
  const steps = events.filter(e => e.type === "step_end");
  const passed = steps.filter(e => e.success).length;
  const failed = steps.filter(e => !e.success).length;
  const warnings = steps.filter(e => e.dify_would_truncate).length;
  const turns = events.filter(e => e.type === "turn_start").length;
  const done = events.find(e => e.type === "done");
  const lastApi = [...events].reverse().find(e => e.type === "turn_api");
  const totalTokens = events.filter(e => e.type === "turn_api").reduce((s, e) => s + (e.input_tokens || 0) + (e.output_tokens || 0), 0);

  useEffect(() => {
    let ws;
    let reconnectTimer;
    const connect = () => {
      ws = new WebSocket(`ws://${location.host}`);
      wsRef.current = ws;
      ws.onopen = () => console.log("WS connected");
      ws.onmessage = (msg) => {
        const event = JSON.parse(msg.data);
        setEvents(prev => [...prev, event]);
        if (event.type === "done") { setRunning(false); setWaitingForUser(false); }
        if (event.type === "waiting_for_user") setWaitingForUser(true);
        if (event.type === "user_reply" || event.type === "auto_reply") setWaitingForUser(false);
        if (event.type === "step_end" && !event.success) {
          setExpanded(prev => ({ ...prev, [event.step]: true }));
        }
      };
      ws.onclose = () => {
        console.log("WS disconnected, reconnecting in 2s...");
        reconnectTimer = setTimeout(connect, 2000);
      };
    };
    connect();
    return () => { clearTimeout(reconnectTimer); ws?.close(); };
  }, []);

  // Auto-scroll
  useEffect(() => {
    if (feedRef.current) {
      feedRef.current.scrollTop = feedRef.current.scrollHeight;
    }
  }, [events]);

  const sendReply = () => {
    if (!replyText.trim() || !wsRef.current) return;
    wsRef.current.send(JSON.stringify({ type: "user_reply", text: replyText.trim() }));
    setReplyText("");
    setWaitingForUser(false);
  };

  const handleRun = async (mode) => {
    setEvents([]);
    setRunning(true);
    setExpanded({});
    setWaitingForUser(false);
    // Parse file paths from textarea (one per line)
    const filePaths = (config.filePaths || "").split("\n").map(s => s.trim()).filter(Boolean);
    await fetch("/api/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...config, mode, filePaths }),
    });
  };

  const toggle = (id) => setExpanded(prev => ({ ...prev, [id]: !prev[id] }));

  const fmt = (obj) => {
    try {
      const s = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
      return s.length > 5000 ? s.slice(0, 5000) + "\n... (truncated)" : s;
    } catch { return String(obj); }
  };

  const fmtBytes = (n) => n > 1024 ? `${(n/1024).toFixed(1)}KB` : `${n}B`;

  return (
    <div className="app">
      <h1>Avni Bundle Agent Debugger <span>simulates Dify workflow locally</span></h1>

      <div className="config">
        <div className="config-row">
          <label>Anthropic API Key
            <input type="password" value={config.anthropicApiKey}
              onChange={e => setConfig({...config, anthropicApiKey: e.target.value})}
              placeholder="sk-ant-..." />
          </label>
          <label>Avni Auth Token
            <input type="password" value={config.authToken}
              onChange={e => setConfig({...config, authToken: e.target.value})}
              placeholder="eyJ..." />
          </label>
        </div>
        <div className="config-row">
          <label>Server URL
            <input value={config.serverUrl}
              onChange={e => setConfig({...config, serverUrl: e.target.value})} />
          </label>
          <label>Org Name
            <input value={config.orgName}
              onChange={e => setConfig({...config, orgName: e.target.value})} />
          </label>
        </div>
        <div className="config-row">
          <label style={{flex: "1 1 100%"}}>Server-side file paths (one per line — for Excel files on the server)
            <textarea value={config.filePaths || ""}
              onChange={e => setConfig({...config, filePaths: e.target.value})}
              placeholder={"tests/resources/scoping/Durga India Modelling.xlsx\ntests/resources/scoping/Durga India Scoping Document.xlsx"}
              style={{minHeight: "50px"}} />
          </label>
        </div>
        <div className="config-row">
          <label style={{flex: "1 1 100%"}}>Or: Upload files (browser-side extraction) / paste text
            <div className="file-upload">
              <input type="file" accept=".xlsx,.xls,.csv,.txt" multiple onChange={handleFileUpload} />
              {fileNames.length > 0 && <span className="file-name">{fileNames.join(" + ")} loaded</span>}
            </div>
            <textarea value={config.srsText}
              onChange={e => setConfig({...config, srsText: e.target.value})}
              placeholder="Or paste SRS text here (used only if no server-side files provided)"
              style={{marginTop: "6px", minHeight: "40px"}} />
          </label>
        </div>
        <div className="btn-row">
          <button className="btn" onClick={() => handleRun("direct")} disabled={running || !config.anthropicApiKey}
            style={{background: "#238636", fontSize: "14px", padding: "12px 32px"}}>
            {running ? <><span className="spinner"/> Running Pipeline...</> : "Run Pipeline"}
          </button>
          {running && <span style={{color: "#8b949e"}}>Running — watch steps below</span>}
        </div>
      </div>

      {events.length > 0 && (
        <div className="stats">
          <div className="stat"><div className="stat-val blue">{turns}</div><div className="stat-label">Turns</div></div>
          <div className="stat"><div className="stat-val green">{passed}</div><div className="stat-label">Passed</div></div>
          <div className="stat"><div className="stat-val red">{failed}</div><div className="stat-label">Failed</div></div>
          <div className="stat"><div className="stat-val yellow">{warnings}</div><div className="stat-label">Dify Would Truncate</div></div>
          <div className="stat"><div className="stat-val blue">{totalTokens.toLocaleString()}</div><div className="stat-label">Total Tokens</div></div>
        </div>
      )}

      <div className="feed" ref={feedRef}>
        {events.map((ev, i) => {
          if (ev.type === "info") {
            return <div key={i} className="info-event">{ev.message}</div>;
          }
          if (ev.type === "error") {
            return <div key={i} className="error-event">{ev.message}</div>;
          }
          if (ev.type === "turn_start") {
            return (
              <div key={i} className="turn-marker">
                <hr/> Turn {ev.turn}/{ev.maxTurns} <hr/>
              </div>
            );
          }
          if (ev.type === "turn_api") {
            return (
              <div key={i} className="info-event">
                Claude API: {ev.duration_ms}ms | in:{ev.input_tokens} out:{ev.output_tokens} | stop: {ev.stop_reason}
              </div>
            );
          }
          if (ev.type === "agent_message") {
            return (
              <div key={i} className="event">
                <div className="event-header" onClick={() => toggle(`msg-${i}`)}>
                  <span className="event-icon">💬</span>
                  <span className="event-name">Agent Message</span>
                  <span className="event-meta">Turn {ev.turn}</span>
                </div>
                {(expanded[`msg-${i}`] !== false) && (
                  <div className="event-body">
                    <div className="agent-msg">{ev.text}</div>
                  </div>
                )}
              </div>
            );
          }
          if (ev.type === "step_start") {
            // Only show if no corresponding step_end yet
            const hasEnd = events.some(e => e.type === "step_end" && e.step === ev.step);
            if (hasEnd) return null;
            return (
              <div key={i} className="event">
                <div className="event-header">
                  <span className="spinner"/>
                  <span className="event-name">{ev.name}</span>
                  <span className={`event-phase phase-${ev.phase || "other"}`}>{ev.phase || "other"}</span>
                </div>
              </div>
            );
          }
          if (ev.type === "step_end") {
            const isOpen = expanded[ev.step];
            const icon = ev.success ? "✅" : "🔴";
            return (
              <div key={i} className="event">
                <div className="event-header" onClick={() => toggle(ev.step)}>
                  <span className="event-icon">{icon}</span>
                  <span className="event-name">{ev.name}</span>
                  <span className={`event-phase phase-${ev.phase || guessPhase(ev.name)}`}>
                    {ev.phase || guessPhase(ev.name)}
                  </span>
                  <span className="event-meta">
                    {ev.duration_ms != null && <span className="event-duration">{ev.duration_ms}ms</span>}
                    <span className={`event-size ${ev.dify_would_truncate ? "warn" : ""}`}>
                      {fmtBytes(ev.size_bytes || 0)}
                      {ev.dify_would_truncate && " ⚠️ >64KB"}
                    </span>
                  </span>
                </div>
                {isOpen && (
                  <div className="event-body">
                    <div className="section-label">Arguments</div>
                    <div className="json-block args">{fmt(ev.args)}</div>
                    <div className="section-label">Response</div>
                    <div className={`json-block result ${ev.success ? "" : "error"}`}>{fmt(ev.result)}</div>
                  </div>
                )}
              </div>
            );
          }
          if (ev.type === "auto_reply") {
            return <div key={i} className="auto-reply">{ev.text}</div>;
          }
          if (ev.type === "user_reply") {
            return <div key={i} className="user-reply-sent">{ev.text}</div>;
          }
          if (ev.type === "waiting_for_user") {
            const quickReplies = [
              { label: "Approve & Generate Bundle", text: "Approved. Proceed with bundle generation, validation, and upload to Avni.", color: "#238636" },
              { label: "Approve with Upload", text: "Approved. Generate bundle, validate, and upload it.", color: "#238636" },
              { label: "No changes, looks good", text: "No changes needed. This looks correct. Proceed.", color: "#1f6feb" },
            ];
            return (
              <div key={i} className="user-reply-box">
                <div className="label">Agent is waiting for your response:</div>
                <div className="input-row">
                  <input value={replyText} onChange={e => setReplyText(e.target.value)}
                    placeholder="Type your reply or use quick actions below..." onKeyDown={e => e.key === "Enter" && sendReply()} autoFocus />
                  <button className="btn-sm" onClick={sendReply}>Send</button>
                </div>
                <div style={{display:"flex", gap:"6px", marginTop:"8px", flexWrap:"wrap"}}>
                  {quickReplies.map((qr, qi) => (
                    <button key={qi} className="btn-sm" style={{background: qr.color, fontSize:"11px", padding:"6px 10px"}}
                      onClick={() => {
                        wsRef.current?.send(JSON.stringify({ type: "user_reply", text: qr.text }));
                        setWaitingForUser(false);
                      }}>
                      {qr.label}
                    </button>
                  ))}
                </div>
              </div>
            );
          }
          if (ev.type === "done") {
            const downloadUrl = ev.conversation_id && ev.server_url
              ? `${ev.server_url.replace(/\/$/, "")}/download-bundle-zip?conversation_id=${ev.conversation_id}`
              : null;
            return (
              <div key={i} className={`done-banner ${ev.success ? "success" : "fail"}`}>
                {ev.success ? "✅ Pipeline completed successfully" : "🔴 Pipeline failed"}
                {ev.turns && ` in ${ev.turns} turns`}
                {ev.total_input_tokens && ` | ${ev.total_input_tokens.toLocaleString()} input + ${ev.total_output_tokens.toLocaleString()} output tokens`}
                {ev.reason && ` — ${ev.reason}`}
                {downloadUrl && ev.success && (
                  <a href={downloadUrl} download="bundle.zip"
                    style={{marginLeft: "16px", background: "#238636", color: "#fff", padding: "6px 16px",
                      borderRadius: "4px", textDecoration: "none", fontWeight: 600, fontSize: "12px"}}>
                    Download Bundle ZIP
                  </a>
                )}
              </div>
            );
          }
          return null;
        })}
        {running && <div className="info-event"><span className="spinner"/> Waiting for next event...</div>}
      </div>
    </div>
  );
}

function guessPhase(name) {
  if (["get_srs_text", "store_entities", "validate_entities", "store_srs_text", "store_auth_token"].includes(name)) return "extract";
  if (["generate_spec", "get_spec", "validate_spec", "get_spec_section", "update_spec_section"].includes(name)) return "spec";
  if (["generate_bundle", "validate_bundle", "get_bundle_files", "get_bundle_file", "put_bundle_file"].includes(name)) return "bundle";
  if (["upload_bundle", "upload_status"].includes(name)) return "upload";
  return "other";
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
