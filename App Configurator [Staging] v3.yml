    - data:
        code: "import re\n\ndef main(agent_response: str) -> dict:\n    # Extract\
          \ spec_yaml from agent response\n    # Look for SPEC_APPROVED marker followed\
          \ by YAML content\n    if \"SPEC_APPROVED\" not in agent_response:\n   \
          \     return {\"spec_yaml\": \"\", \"approved\": False}\n    \n    # Extract\
          \ everything after SPEC_APPROVED\n    parts = agent_response.split(\"SPEC_APPROVED\"\
          , 1)\n    if len(parts) < 2:\n        return {\"spec_yaml\": \"\", \"approved\"\
          : False}\n    \n    spec_content = parts[1].strip()\n    \n    # Remove\
          \ markdown code blocks if present\n    spec_content = re.sub(r'^```ya?ml\\\
          s*\\n', '', spec_content, flags=re.MULTILINE)\n    spec_content = re.sub(r'\\\
          n```\\s*$', '', spec_content, flags=re.MULTILINE)\n    \n    return {\n\
          \        \"spec_yaml\": spec_content.strip(),\n        \"approved\": True\n\
          \    }\n"
        code_language: python3
        outputs:
          approved:
            children: null
            type: boolean
          spec_yaml:
            children: null
            type: string
